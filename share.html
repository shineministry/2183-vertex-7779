<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Vault File</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep: #060810;
      --bg-mid: #0d1020;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --accent: #6ee7f7;
      --accent2: #a78bfa;
      --accent3: #f472b6;
      --text: #e8eaf6;
      --text-dim: rgba(232,234,246,0.45);
      --success: #4ade80;
      --error: #f87171;
      --glow: rgba(110,231,247,0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg::before {
      content: '';
      position: absolute;
      width: 900px; height: 900px;
      top: -300px; left: -200px;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 65%);
      animation: drift1 18s ease-in-out infinite alternate;
    }

    .bg::after {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      bottom: -200px; right: -150px;
      background: radial-gradient(circle, rgba(110,231,247,0.10) 0%, transparent 65%);
      animation: drift2 22s ease-in-out infinite alternate;
    }

    .bg-blob3 {
      position: absolute;
      width: 500px; height: 500px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(244,114,182,0.06) 0%, transparent 65%);
      animation: drift3 14s ease-in-out infinite alternate;
    }

    /* Subtle grid */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
    }

    @keyframes drift1 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(80px, 60px) scale(1.15); }
    }
    @keyframes drift2 {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(-60px, -80px) scale(1.1); }
    }
    @keyframes drift3 {
      from { transform: translate(-50%,-50%) scale(0.9); }
      to   { transform: translate(-50%,-50%) scale(1.2); }
    }

    /* ── Card ── */
    .scene {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 64px rgba(0,0,0,0.5),
        0 0 80px rgba(110,231,247,0.04);
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Icon ── */
    .icon-wrap {
      width: 64px; height: 64px;
      margin: 0 auto 28px;
      position: relative;
      animation: iconIn 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes iconIn {
      from { opacity: 0; transform: scale(0.6) rotate(-10deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .icon-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      animation: ringPulse 3s ease-in-out infinite;
    }

    .icon-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(110,231,247,0.08);
      animation: ringPulse 3s 0.5s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.06); }
    }

    .icon-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(110,231,247,0.15), rgba(167,139,250,0.15));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-inner svg {
      width: 28px; height: 28px;
      color: var(--accent);
      filter: drop-shadow(0 0 8px rgba(110,231,247,0.6));
    }

    /* ── Heading ── */
    .heading {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #e8eaf6 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.6s 0.25s both;
    }

    .subheading {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.32s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Status states ── */
    #status {
      animation: fadeUp 0.6s 0.4s both;
    }

    /* Loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
    }

    .spinner {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(110,231,247,0.1);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* Message states */
    .msg {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 400;
    }

    .msg.error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      color: #fca5a5;
    }

    .msg.warning {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.2);
      color: #fcd34d;
    }

    .msg svg { flex-shrink: 0; width: 18px; height: 18px; }

    /* ── Password form ── */
    .pwd-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap input {
      width: 100%;
      padding: 14px 48px 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
      letter-spacing: 2px;
    }

    .field-wrap input::placeholder {
      letter-spacing: 0;
      color: rgba(232,234,246,0.2);
    }

    .field-wrap input:focus {
      border-color: rgba(110,231,247,0.4);
      background: rgba(110,231,247,0.04);
      box-shadow: 0 0 0 3px rgba(110,231,247,0.08), 0 0 20px rgba(110,231,247,0.06);
    }

    .field-wrap input.shake {
      animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
      border-color: rgba(248,113,113,0.5);
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    .toggle-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .toggle-eye:hover { color: var(--text); }
    .toggle-eye svg { width: 16px; height: 16px; }

    /* Error hint */
    .err-hint {
      font-size: 12px;
      color: var(--error);
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 18px;
      transition: opacity 0.2s;
    }
    .err-hint.hidden { opacity: 0; pointer-events: none; }
    .err-hint svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* Submit button */
    .btn-submit {
      position: relative;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6ee7f7, #a78bfa);
      color: #060810;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 4px 24px rgba(110,231,247,0.2);
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(110,231,247,0.3);
    }

    .btn-submit:hover::before { opacity: 1; }
    .btn-submit:active { transform: translateY(0); }

    .btn-submit.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* Lock badge */
    .lock-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .lock-badge svg { width: 12px; height: 12px; }

    /* ── Download state ── */
    .download-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .download-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(110,231,247,0.1));
      border: 1px solid rgba(74,222,128,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: successPop 0.5s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 0 40px rgba(74,222,128,0.12);
    }

    .download-icon svg {
      width: 30px; height: 30px;
      color: var(--success);
      filter: drop-shadow(0 0 8px rgba(74,222,128,0.5));
    }

    @keyframes successPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .file-info {
      text-align: center;
    }

    .file-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      word-break: break-all;
    }

    .file-ready {
      font-size: 12px;
      color: var(--success);
      letter-spacing: 0.5px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 15px 24px;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(74,222,128,0.15), rgba(110,231,247,0.1));
      border: 1px solid rgba(74,222,128,0.25);
      color: var(--success);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
      justify-content: center;
      transition: transform 0.18s, box-shadow 0.18s, background 0.2s;
      box-shadow: 0 4px 20px rgba(74,222,128,0.1);
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.1s both;
    }

    .btn-download::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(74,222,128,0.08), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(74,222,128,0.2);
    }

    .btn-download:hover::before { opacity: 1; }
    .btn-download svg { width: 18px; height: 18px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }
    .divider-text {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* Footer */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 11px;
      color: rgba(232,234,246,0.2);
      letter-spacing: 0.3px;
      animation: fadeUp 0.6s 0.5s both;
    }

    .card-footer span {
      color: rgba(110,231,247,0.35);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: 1; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1); }
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-blob3"></div>
</div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="scene">
  <div class="card">

    <!-- Icon -->
    <div class="icon-wrap">
      <div class="icon-ring"></div>
      <div class="icon-inner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/>
        </svg>
      </div>
    </div>

    <h1 class="heading">Shared File</h1>
    <p class="subheading">Secure file access via Vault</p>

    <div id="status">
      <!-- Loading spinner by default -->
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Verifying link…</div>
      </div>
    </div>

    <div class="card-footer">Protected by <span>VAULT</span> · End-to-end secured</div>

  </div>
</div>

<script>
  // ── Particles ──
  (function spawnParticles() {
    const container = document.getElementById('particles');
    const colors = ['#6ee7f7','#a78bfa','#f472b6','#4ade80'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        bottom:${Math.random()*-20}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${8+Math.random()*14}s;
        animation-delay:${Math.random()*10}s;
        filter:blur(${Math.random()>0.5?'1px':'0px'});
        opacity:0;
      `;
      container.appendChild(p);
    }
  })();

  // ── Helpers ──
  const statusEl = () => document.getElementById('status');

  function setStatus(html) {
    const el = statusEl();
    el.style.animation = 'none';
    el.innerHTML = html;
    el.offsetHeight; // reflow
    el.style.animation = 'fadeUp 0.4s cubic-bezier(0.22,1,0.36,1)';
  }

  function showError(icon, message) {
    setStatus(`
      <div class="msg error">
        ${icon}
        <span>${message}</span>
      </div>
    `);
  }

  const iconExpired = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>`;
  const iconBan    = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>`;

  // ── Download ──
  let resolvedData = null;

  async function downloadFile(data) {
    setStatus(`
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Fetching file…</div>
      </div>
    `);

    const fileUrl = "https://backend.shinumaths989.workers.dev/docs/" + data.file;
    const res = await fetch(fileUrl);

    if (!res.ok) {
      showError(iconBan, 'File not found or unavailable.');
      return;
    }

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const name = data.name || data.file;

    setStatus(`
      <div class="download-wrap">
        <div class="download-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75l3 3m0 0l3-3m-3 3v-7.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <div class="file-info">
          <div class="file-name">${name}</div>
          <div class="file-ready">Ready to download</div>
        </div>
        <a class="btn-download" href="${url}" download="${name}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/>
          </svg>
          Download File
        </a>
      </div>
    `);
  }

  // ── Password prompt ──
  function showPasswordPrompt() {
    setStatus(`
      <div class="pwd-form" id="pwd-form">
        <div>
          <div class="field-label">Password</div>
          <div class="field-wrap">
            <input type="password" id="pwd-input" placeholder="Enter password" autocomplete="current-password" />
            <button class="toggle-eye" id="eye-btn" title="Show/hide password" tabindex="-1">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
          <div class="err-hint hidden" id="err-hint">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126z"/></svg>
            Incorrect password. Try again.
          </div>
        </div>
        <button class="btn-submit" id="submit-btn">Unlock File</button>
        <div class="lock-badge">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          Password protected file
        </div>
      </div>
    `);

    const input   = document.getElementById('pwd-input');
    const btn     = document.getElementById('submit-btn');
    const errHint = document.getElementById('err-hint');
    const eyeBtn  = document.getElementById('eye-btn');

    input.focus();

    // Toggle show/hide password
    eyeBtn.addEventListener('click', () => {
      const shown = input.type === 'text';
      input.type = shown ? 'password' : 'text';
      document.getElementById('eye-icon').innerHTML = shown
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>`;
    });

    async function attempt() {
      if (input.value === resolvedData.password) {
        btn.textContent = 'Unlocking…';
        btn.classList.add('loading');
        await downloadFile(resolvedData);
      } else {
        errHint.classList.remove('hidden');
        input.classList.add('shake');
        input.value = '';
        input.focus();
        setTimeout(() => input.classList.remove('shake'), 450);
      }
    }

    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    input.addEventListener('input', () => errHint.classList.add('hidden'));
  }

  // ── Init ──
  async function init() {
    const params = new URLSearchParams(location.search);
    const token  = params.get('t');

    if (!token) {
      showError(iconBan, 'Missing or invalid share token.');
      return;
    }

    try {
      const data = JSON.parse(atob(token));

      if (data.exp && Date.now() > data.exp) {
        showError(iconExpired, 'This share link has expired.');
        return;
      }

      resolvedData = data;

      if (data.password) {
        showPasswordPrompt();
      } else {
        await downloadFile(data);
      }

    } catch (err) {
      console.error(err);
      showError(iconBan, 'Invalid share link. Please request a new one.');
    }
  }

  init();
</script>
