<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Information Portal</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-color: #333333;
            --primary-color: #5a67d8;
            --primary-hover: #4c51bf;
            --border-color: #e2e8f0;
            --error-color: #e53e3e;
            --success-bg: #f0fff4;
            --success-border: #38a169;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            transition: all 0.5s ease;
        }

        h2 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 8px;
        }

        p.subtitle {
            text-align: center;
            color: #718096;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(90, 103, 216, 0.15);
        }

        input.invalid {
            border-color: var(--error-color);
            box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.15);
        }

        .error-message {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .section-divider {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 24px 0;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #4a5568;
            margin-bottom: 12px;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(90, 103, 216, 0.25);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .fade-out-target {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .hide-animation {
            opacity: 0 !important;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .password-display {
            display: none;
            padding: 24px;
            background-color: var(--success-bg);
            border: 2px dashed var(--success-border);
            border-radius: 8px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .password-display.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .password-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: bold;
            color: #22543d;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="formContent" class="fade-out-target">
            <h2>Profile Verification</h2>
            <p class="subtitle">Shineil Mathias - Internal Record Check</p>
            
            <form id="profileForm" onsubmit="handleSubmit(event)" novalidate>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name" autocomplete="off" required>
                    <div class="error-message" id="nameError">Verification failed.</div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" placeholder="Enter school email" autocomplete="off" required>
                    <div class="error-message" id="emailError">Verification failed.</div>
                </div>

                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" placeholder="Enter city" autocomplete="off" required>
                    <div class="error-message" id="cityError">Verification failed.</div>
                </div>

                <div class="form-group">
                    <label for="country">Country</label>
                    <input type="text" id="country" placeholder="Enter country" autocomplete="off" required>
                    <div class="error-message" id="countryError">Verification failed.</div>
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                    <div class="error-message" id="dobError">Verification failed.</div>
                </div>

                <hr class="section-divider">
                <div class="section-title">Internal Security Verification</div>

                <div class="form-group">
                    <label for="loaDate">Date Letter of Accommodation was Emailed</label>
                    <input type="date" id="loaDate" required>
                    <div class="error-message" id="loaDateError">Verification failed.</div>
                </div>

                <button type="submit" id="submitBtn">Verify Identity</button>
            </form>
        </div>

        <div class="password-display" id="passwordBox">
            <div style="font-size: 12px; color: #276749; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;">Access Granted</div>
            <div class="password-value">myQw45@</div>
        </div>
    </div>

    <script>
        // Target Verification Values
        const validNames = ["peter porenta", "roman neumayer"];
        const validEmails = ["roman.neumayer@herzjesugym.at", "peter.porenta@herzjesugym.at", "direktion@herzjesugym.at"];
        const validCity = "salzburg";
        const validCountry = "austria";
        const validDob = "2010-03-07";
        const validLoaDate = "2026-03-25"; // Standard HTML5 YYYY-MM-DD formatting for 25.03.2026

        function handleSubmit(event) {
            event.preventDefault();

            const fields = ['name', 'email', 'city', 'country', 'dob', 'loaDate'];
            let isValid = true;

            const data = {};
            fields.forEach(f => {
                const el = document.getElementById(f);
                data[f] = { el: el, val: el.value.trim().toLowerCase(), err: document.getElementById(`${f}Error`) };
            });

            // Perform Checks
            if (!validNames.includes(data.name.val)) { toggle(data.name, false); isValid = false; } else { toggle(data.name, true); }
            if (!validEmails.includes(data.email.val)) { toggle(data.email, false); isValid = false; } else { toggle(data.email, true); }
            if (data.city.val !== validCity) { toggle(data.city, false); isValid = false; } else { toggle(data.city, true); }
            if (data.country.val !== validCountry) { toggle(data.country, false); isValid = false; } else { toggle(data.country, true); }
            if (document.getElementById('dob').value !== validDob) { toggle(data.dob, false); isValid = false; } else { toggle(data.dob, true); }
            if (document.getElementById('loaDate').value !== validLoaDate) { toggle(data.loaDate, false); isValid = false; } else { toggle(data.loaDate, true); }

            if (isValid) {
                const formContent = document.getElementById('formContent');
                const passwordBox = document.getElementById('passwordBox');

                formContent.classList.add('hide-animation');
                setTimeout(() => {
                    formContent.style.display = 'none';
                    passwordBox.classList.add('show');
                }, 500);
            }
        }

        function toggle(fieldObj, isCorrect) {
            if (!isCorrect) {
                fieldObj.el.classList.add('invalid');
                fieldObj.err.style.display = 'block';
            } else {
                fieldObj.el.classList.remove('invalid');
                fieldObj.err.style.display = 'none';
            }
        }

        // Auto-remove error states on input
        ['name', 'email', 'city', 'country', 'dob', 'loaDate'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                this.classList.remove('invalid');
                document.getElementById(`${id}Error`).style.display = 'none';
            });
        });
    </script>
</body>
</html>
