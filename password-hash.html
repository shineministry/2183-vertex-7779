<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Password Hash Generator</title>

<style>

:root{

--bg:#f1f5f9;
--card:#ffffff;

--accent:#2563eb;
--accent2:#1d4ed8;

--text:#0f172a;
--muted:#64748b;

--border:#e2e8f0;

--shadow:
0 25px 60px rgba(0,0,0,.08);

}

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:
linear-gradient(
135deg,
#eff6ff,
#ffffff,
#dbeafe
);

font-family:
"Segoe UI",
sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:var(--text);

}

@keyframes float{

0%{
transform:
translateY(0px);
}

50%{
transform:
translateY(-10px);
}

100%{
transform:
translateY(0px);
}

}

@keyframes glow{

0%{

box-shadow:
0 0 0 rgba(37,99,235,0);

}

50%{

box-shadow:
0 0 45px
rgba(37,99,235,.18);

}

100%{

box-shadow:
0 0 0 rgba(37,99,235,0);

}

}

@keyframes fade{

from{

opacity:0;

transform:

translateY(30px)
scale(.96);

}

to{

opacity:1;

transform:

translateY(0)
scale(1);

}

}

.bg-circle{

position:absolute;

border-radius:50%;

filter:blur(70px);

opacity:.35;

animation:

float 10s infinite;

}

.bg1{

width:280px;
height:280px;

background:#60a5fa;

top:-80px;
left:-80px;

}

.bg2{

width:300px;
height:300px;

background:#93c5fd;

right:-120px;
bottom:-80px;

animation-delay:2s;

}

.card{

width:92%;
max-width:650px;

background:

rgba(255,255,255,.92);

backdrop-filter:

blur(18px);

padding:45px;

border-radius:32px;

border:

1px solid
rgba(255,255,255,.5);

box-shadow:

var(--shadow);

animation:

fade .8s ease,

glow 5s infinite;

position:relative;

z-index:2;

}

.logo{

font-size:64px;

text-align:center;

margin-bottom:18px;

animation:

float 5s infinite;

}

h1{

font-size:30px;

text-align:center;

margin-bottom:8px;

color:

var(--accent);

}

.subtitle{

text-align:center;

color:

var(--muted);

line-height:1.7;

margin-bottom:28px;

}

.input-wrap{

position:relative;

}

input{

width:100%;

padding:

18px 20px;

border-radius:18px;

border:

1px solid
var(--border);

font-size:15px;

outline:none;

transition:.25s;

background:white;

}

input:focus{

border-color:

var(--accent);

box-shadow:

0 0 0 5px

rgba(37,99,235,.12);

}

button{

width:100%;

margin-top:18px;

border:none;

padding:17px;

border-radius:18px;

background:

linear-gradient(

135deg,

var(--accent),

var(--accent2)

);

color:white;

font-weight:800;

font-size:15px;

cursor:pointer;

transition:.25s;

box-shadow:

0 12px 28px

rgba(37,99,235,.22);

}

button:hover{

transform:

translateY(-2px);

}

button:active{

transform:

scale(.98);

}

.result{

margin-top:25px;

background:#0f172a;

padding:22px;

border-radius:18px;

color:#22c55e;

font-family:

Consolas,
monospace;

font-size:13px;

line-height:1.7;

word-break:break-all;

min-height:95px;

position:relative;

overflow:hidden;

}

.copy{

position:absolute;

top:12px;

right:12px;

border:none;

background:#2563eb;

padding:7px 12px;

border-radius:10px;

font-size:11px;

color:white;

font-weight:700;

cursor:pointer;

width:auto;

margin:0;

}

.secure{

margin-top:18px;

text-align:center;

font-size:12px;

color:#64748b;

font-weight:700;

}

.secure span{

color:#16a34a;

}

</style>

</head>

<body>

<div class="bg-circle bg1"></div>
<div class="bg-circle bg2"></div>

<div class="card">

<div class="logo">
🔐
</div>

<h1>
VAULT HASH GENERATOR
</h1>

<div class="subtitle">

Generate SHA-256 password hashes<br>

For Cloudflare Worker Secrets

</div>

<div class="input-wrap">

<input

id="pwd"

type="password"

placeholder=

"Enter secure password"

autocomplete="off">

</div>

<button
onclick="generateHash()">

GENERATE HASH

</button>

<div
class="result"
id="result">

Hash output appears here

<button
class="copy"
onclick="copyHash()">

COPY

</button>

</div>

<div class="secure">

<span>🔒 Secure:</span>

Runs entirely in browser

</div>

</div>

<script>

async function generateHash(){

const pwd=

document
.getElementById(
"pwd"
)
.value
.trim();

if(!pwd){

alert(
"Enter password"
);

return;

}

const enc=

new TextEncoder();

const hash=

await crypto
.subtle
.digest(

"SHA-256",

enc.encode(
pwd
)

);

const hex=

Array
.from(

new Uint8Array(
hash
)

)

.map(

b=>

b
.toString(16)
.padStart(2,"0")

)

.join("");

document
.getElementById(
"result"
)
.innerHTML=

hex+

`<button
class="copy"
onclick="copyHash()">

COPY

</button>`;

}

function copyHash(){

const text=

document
.getElementById(
"result"
)
.innerText
.replace(
"COPY",
""
)
.trim();

navigator
.clipboard
.writeText(
text
);

const btn=

document
.querySelector(
".copy"
);

btn.textContent=

"✓ COPIED";

setTimeout(()=>{

btn.textContent=

"COPY";

},1500);

}

</script>

</body>
</html>
