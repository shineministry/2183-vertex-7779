<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

type="image/png"

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --whatsapp-green: #25d366;
            --email-blue: #0ea5e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .background-animate {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }

        .background-animate::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: transparent cubic-bezier(0.4, 0, 0.2, 1) infinite;
            background-image: 
                radial-gradient(rgba(56, 189, 248, 0.1) 2px, transparent 0),
                radial-gradient(rgba(99, 102, 241, 0.1) 2px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            animation: moveBackground 40s linear infinite;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        /* Main Glassmorphism Card */
        .container {
            position: relative;
            z-index: 2;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 50px rgba(56, 189, 248, 0.1);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon Animation */
        .lock-icon-box {
            width: 80px;
            height: 80px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            border: 1px solid rgba(56, 189, 248, 0.3);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            50% { box-shadow: 0 0 20px 10px rgba(56, 189, 248, 0.1); }
        }

        .lock-icon {
            font-size: 2rem;
            animation: subtleShake 4s infinite ease-in-out;
        }

        @keyframes subtleShake {
            0%, 90%, 100% { transform: rotate(0deg); }
            92% { transform: rotate(-10deg); }
            94% { transform: rotate(10deg); }
            96% { transform: rotate(-10deg); }
            98% { transform: rotate(10deg); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* Action Buttons */
        .contact-channels {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-whatsapp {
            background: var(--whatsapp-green);
            color: #fff;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.5);
        }

        .btn-email {
            background: rgba(14, 165, 233, 0.15);
            color: var(--accent-glow);
            border: 1px solid rgba(14, 165, 233, 0.4);
        }

        .btn-email:hover {
            background: var(--email-blue);
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
            border-color: transparent;
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* SVG Icons styling */
        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: rgba(148, 163, 184, 0.5);
        }
    </style>
</head>
