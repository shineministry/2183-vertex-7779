<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Files Manager — Vault Studio</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#1a73e8">
<script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
<script src="sha256.js"></script>
<script src="offline-auth.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;font-size:14px;color:#1e293b;background:#f8fafc;}

/* ====== TITLE BAR ====== */
.fm-titlebar{display:flex;align-items:center;height:36px;background:linear-gradient(135deg,#1a73e8,#1557b0);padding:0 14px;gap:8px;user-select:none;flex-shrink:0;}
.fm-titlebar svg{width:18px;height:18px;color:#fff;}
.fm-titlebar-text{color:#fff;font-size:13px;font-weight:700;flex:1;letter-spacing:.3px;}
.fm-titlebar-btn{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:16px;line-height:1;}
.fm-titlebar-btn:hover{color:#fff;background:rgba(255,255,255,.15);}

/* ====== TOOLBAR ====== */
.fm-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;flex-shrink:0;}
.fm-tb-group{display:flex;align-items:center;gap:4px;}
.fm-tb-sep{width:1px;height:22px;background:#e2e8f0;margin:0 4px;}
.fm-tb-label{font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.fm-tb-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid #e2e8f0;border-radius:6px;background:#fff;font-size:11px;font-weight:600;color:#475569;cursor:pointer;white-space:nowrap;transition:all .15s;}
.fm-tb-btn:hover{background:#f1f5f9;border-color:#cbd5e1;color:#1e293b;}
.fm-tb-btn svg{width:13px;height:13px;}
.fm-tb-btn.primary{background:#1a73e8;color:#fff;border-color:#1557b0;}
.fm-tb-btn.primary:hover{background:#1557b0;}
.fm-tb-btn.success{background:#0d9488;color:#fff;border-color:#0f766e;}
.fm-tb-btn.success:hover{background:#0f766e;}
.fm-tb-btn.danger{background:#dc2626;color:#fff;border-color:#b91c1c;}
.fm-tb-btn.danger:hover{background:#b91c1c;}
.fm-tb-search{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid #e2e8f0;border-radius:6px;background:#f8fafc;flex:1;min-width:140px;max-width:280px;}
.fm-tb-search svg{width:13px;height:13px;color:#94a3b8;flex-shrink:0;}
.fm-tb-search input{border:none;background:none;outline:none;font-size:12px;width:100%;color:#1e293b;font-family:inherit;}
.fm-tb-right{margin-left:auto;display:flex;align-items:center;gap:6px;}

/* ====== LAYOUT ====== */
.fm-layout{display:flex;flex:1;overflow:hidden;}

/* ====== SIDEBAR (CATEGORIES) ====== */
.fm-sidebar{width:240px;min-width:200px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.fm-sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #e2e8f0;}
.fm-sidebar-head span{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;}
.fm-sidebar-head button{background:none;border:1px solid #e2e8f0;border-radius:5px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#475569;transition:all .15s;}
.fm-sidebar-head button:hover{background:#f1f5f9;border-color:#cbd5e1;}
.fm-sidebar-head button svg{width:14px;height:14px;}
.fm-cat-list{flex:1;overflow-y:auto;padding:6px;}
.fm-cat-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all .12s;margin-bottom:2px;position:relative;}
.fm-cat-item:hover{background:#f1f5f9;}
.fm-cat-item.active{background:#eff6ff;color:#1a73e8;font-weight:700;}
.fm-cat-item svg{width:15px;height:15px;flex-shrink:0;}
.fm-cat-item .fm-cat-count{margin-left:auto;font-size:10px;font-weight:700;color:#94a3b8;background:#f1f5f9;padding:1px 6px;border-radius:8px;}
.fm-cat-item.active .fm-cat-count{background:#dbeafe;color:#1a73e8;}
.fm-cat-item .fm-cat-del{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;padding:2px;border-radius:3px;}
.fm-cat-item .fm-cat-del:hover{color:#dc2626;background:#fef2f2;}
.fm-cat-item:hover .fm-cat-del{display:flex;}
.fm-cat-item .fm-cat-del svg{width:12px;height:12px;}

/* ====== MAIN AREA ====== */
.fm-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ====== CATEGORY HEADER ====== */
.fm-cat-header{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid #e2e8f0;background:#fff;flex-shrink:0;}
.fm-cat-header h2{font-size:16px;font-weight:800;color:#1e293b;flex:1;}
.fm-cat-header .fm-cat-badge{font-size:11px;font-weight:600;color:#64748b;background:#f1f5f9;padding:3px 10px;border-radius:12px;}

/* ====== CARDS GRID ====== */
.fm-cards{flex:1;overflow-y:auto;padding:16px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;align-content:start;}

/* ====== FILE CARD ====== */
.fm-upload-area{border:2px dashed #cbd5e1;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:6px;color:#94a3b8;font-size:12px;font-weight:600;}
.fm-upload-area:hover,.fm-upload-area.drag-over{border-color:#1a73e8;color:#1a73e8;background:#f0f7ff;}
.fm-upload-area span{pointer-events:none;}
.fm-upload-info{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;font-size:12px;color:#166534;margin-top:6px;}
.fm-upload-info span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fm-card{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px;cursor:default;transition:all .15s;position:relative;display:flex;flex-direction:column;gap:8px;}
.fm-card:hover{border-color:#cbd5e1;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.fm-card.dragging{opacity:.5;border-style:dashed;}
.fm-card.drag-over{border-color:#1a73e8;background:#f0f7ff;}
.fm-card-top{display:flex;align-items:flex-start;gap:10px;}
.fm-card-icon{width:38px;height:38px;border-radius:8px;background:#eff6ff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.fm-card-icon svg{width:20px;height:20px;color:#1a73e8;}
.fm-card-info{flex:1;min-width:0;}
.fm-card-name{font-size:13px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fm-card-file{font-size:11px;color:#64748b;font-family:'Cascadia Code','Fira Code',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.fm-card-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:#94a3b8;flex-wrap:wrap;}
.fm-card-meta svg{width:11px;height:11px;}
.fm-card-meta span{display:flex;align-items:center;gap:3px;}
.fm-card-members{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.fm-member-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 6px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;transition:all .12s;}
.fm-member-chip.on{background:#16a34a;color:#ffffff;border:1px solid #15803d;box-shadow:0 0 0 1px rgba(22,163,74,0.25);}
.fm-member-chip.on::before{content:'\2713';font-weight:900;}
.fm-member-chip.off{background:transparent;color:#94a3b8;border:1px dashed #cbd5e1;opacity:0.6;text-decoration:line-through;}
.fm-member-chip.off::before{content:'\2715';font-weight:900;font-size:9px;color:#cbd5e1;}
.fm-member-chip.on:hover{background:#15803d;}
.fm-member-chip.off:hover{opacity:0.85;border-color:#94a3b8;}
.fm-card-actions{display:flex;gap:4px;position:absolute;top:10px;right:10px;opacity:0;transition:opacity .15s;}
.fm-card:hover .fm-card-actions{opacity:1;}
.fm-card-act[disabled]{opacity:.3;cursor:not-allowed;}
@media (hover:none){ .fm-card-actions{opacity:1;} }
.fm-card-act{width:26px;height:26px;border:1px solid #e2e8f0;border-radius:5px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;transition:all .12s;}
.fm-card-act:hover{background:#f1f5f9;color:#1e293b;}
.fm-card-act.del:hover{background:#fef2f2;color:#dc2626;border-color:#fecaca;}
.fm-card-act svg{width:13px;height:13px;}

/* ====== ADD CARD ====== */
.fm-add-card{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:8px;padding:20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#94a3b8;transition:all .15s;min-height:120px;}
.fm-add-card:hover{border-color:#1a73e8;color:#1a73e8;background:#f0f7ff;}
.fm-add-card svg{width:24px;height:24px;}
.fm-add-card span{font-size:12px;font-weight:600;}

/* ====== EMPTY STATE ====== */
.fm-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:#94a3b8;}
.fm-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4;}
.fm-empty h3{font-size:15px;font-weight:700;color:#64748b;margin-bottom:4px;}
.fm-empty p{font-size:12px;}

/* ====== JSON PANEL ====== */
.fm-json-panel{width:0;overflow:hidden;background:#1e293b;border-left:1px solid #334155;display:flex;flex-direction:column;transition:width .2s;flex-shrink:0;}
.fm-json-panel.open{width:380px;}
.fm-json-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #334155;}
.fm-json-head span{font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}
.fm-json-head button{background:none;border:none;color:#94a3b8;cursor:pointer;padding:2px;}
.fm-json-head button:hover{color:#fff;}
.fm-json-head button svg{width:14px;height:14px;}
.fm-json-body{flex:1;overflow:auto;padding:10px;}
.fm-json-body pre{font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;color:#e2e8f0;line-height:1.5;white-space:pre-wrap;word-break:break-all;margin:0;}
.fm-json-body .jk{color:#7dd3fc;}
.fm-json-body .js{color:#86efac;}
.fm-json-body .jn{color:#fbbf24;}
.fm-json-body .jb{color:#c084fc;}

/* ====== MODAL ====== */
.fm-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:9999;}
.fm-modal-overlay.show{display:flex;}
.fm-modal{background:#fff;border-radius:10px;padding:0;width:420px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.2);overflow:hidden;}
.fm-modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid #e2e8f0;}
.fm-modal-head h3{font-size:14px;font-weight:700;color:#1e293b;}
.fm-modal-head button{background:none;border:none;color:#94a3b8;cursor:pointer;font-size:18px;line-height:1;}
.fm-modal-head button:hover{color:#dc2626;}
.fm-modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;}
.fm-modal-body label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.3px;}
.fm-modal-body input,.fm-modal-body select{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font:inherit;font-size:13px;color:#1e293b;background:#fff;}
.fm-modal-body input:focus,.fm-modal-body select:focus{outline:2px solid #1a73e8;outline-offset:-1px;border-color:#1a73e8;}
.fm-modal-body .fm-field-row{display:flex;gap:8px;}
.fm-modal-body .fm-field-row>div{flex:1;}
.fm-modal-foot{display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid #e2e8f0;background:#f8fafc;}
.fm-modal-foot button{padding:7px 18px;border-radius:6px;border:1px solid #e2e8f0;font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;}
.fm-modal-foot .fm-save{background:#1a73e8;color:#fff;border-color:#1557b0;}
.fm-modal-foot .fm-save:hover{background:#1557b0;}
.fm-modal-foot .fm-cancel{background:#fff;color:#475569;}
.fm-modal-foot .fm-cancel:hover{background:#f1f5f9;}

/* ====== MEMBER TOGGLES IN MODAL ====== */
.fm-modal-members{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0;}

/* ====== TOAST ====== */
.fm-toast{position:fixed;bottom:40px;right:16px;background:#1e293b;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;}
.fm-toast.show{opacity:1;transform:translateY(0);}

/* ====== STATUS BAR ====== */
.fm-statusbar{display:flex;align-items:center;justify-content:space-between;height:24px;background:#1e293b;padding:0 14px;flex-shrink:0;}
.fm-statusbar span{color:rgba(255,255,255,.65);font-size:11px;display:flex;align-items:center;gap:4px;}
.fm-statusbar svg{width:11px;height:11px;color:rgba(255,255,255,.65);}

/* ====== DARK MODE ====== */
body.dark{background:#0f172a;color:#e2e8f0;}
body.dark .fm-toolbar{background:#1e293b;border-color:#334155;}
body.dark .fm-tb-btn{background:#1e293b;color:#94a3b8;border-color:#334155;}
body.dark .fm-tb-btn:hover{background:#334155;color:#e2e8f0;}
body.dark .fm-tb-search{background:#1e293b;border-color:#334155;}
body.dark .fm-tb-search input{color:#e2e8f0;}
body.dark .fm-sidebar{background:#1e293b;border-color:#334155;}
body.dark .fm-sidebar-head{border-color:#334155;}
body.dark .fm-sidebar-head button{border-color:#334155;color:#94a3b8;}
body.dark .fm-cat-item{color:#94a3b8;}
body.dark .fm-cat-item:hover{background:#334155;}
body.dark .fm-cat-item.active{background:#1e3a5f;color:#60a5fa;}
body.dark .fm-cat-item .fm-cat-count{background:#334155;color:#64748b;}
body.dark .fm-cat-item.active .fm-cat-count{background:#1e3a5f;color:#60a5fa;}
body.dark .fm-cat-header{background:#1e293b;border-color:#334155;}
body.dark .fm-cat-header h2{color:#e2e8f0;}
body.dark .fm-card{background:#1e293b;border-color:#334155;}
body.dark .fm-card:hover{border-color:#475569;}
body.dark .fm-card-icon{background:#334155;}
body.dark .fm-card-icon svg{color:#60a5fa;}
body.dark .fm-card-name{color:#e2e8f0;}
body.dark .fm-card-act{background:#334155;border-color:#475569;color:#94a3b8;}
body.dark .fm-card-act:hover{background:#475569;color:#e2e8f0;}
body.dark .fm-add-card{background:#1e293b;border-color:#334155;color:#64748b;}
body.dark .fm-add-card:hover{border-color:#60a5fa;color:#60a5fa;background:#1e3a5f;}
body.dark .fm-modal{background:#1e293b;}
body.dark .fm-modal-head{border-color:#334155;}
body.dark .fm-modal-head h3{color:#e2e8f0;}
body.dark .fm-modal-body input,.body.dark .fm-modal-body select{background:#334155;color:#e2e8f0;border-color:#475569;}
body.dark .fm-modal-foot{background:#1e293b;border-color:#334155;}
body.dark .fm-modal-foot .fm-cancel{background:#334155;color:#94a3b8;}

/* ====== UPLOAD STATUS BADGE (on card) ====== */
.fm-upload-badge{position:absolute;top:10px;left:10px;width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 2px #fff;}
.fm-upload-badge.pending{background:#f59e0b;}
.fm-upload-badge.success{background:#22c55e;}
.fm-upload-badge.failed{background:#ef4444;}
body.dark .fm-upload-badge{box-shadow:0 0 0 2px #1e293b;}

/* ====== UPLOAD RESULTS MODAL ====== */
.fm-modal.wide{width:520px;}
.fm-upload-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0;}
.fm-upload-row .fm-ur-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.fm-upload-row.ok .fm-ur-icon{color:#16a34a;}
.fm-upload-row.err .fm-ur-icon{color:#dc2626;}
.fm-upload-row .fm-ur-info{flex:1;min-width:0;}
.fm-upload-row .fm-ur-name{font-size:12px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fm-upload-row .fm-ur-detail{font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fm-upload-row.err .fm-ur-detail{color:#dc2626;}
.fm-upload-row .fm-ur-retry{padding:4px 9px;border-radius:5px;border:1px solid #fecaca;background:#fef2f2;color:#dc2626;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;}
.fm-upload-row .fm-ur-retry:hover{background:#fee2e2;}
.fm-upload-summary{display:flex;gap:12px;font-size:12px;font-weight:600;padding:2px 2px 6px;}
.fm-upload-summary .ok{color:#16a34a;}
.fm-upload-summary .err{color:#dc2626;}
body.dark .fm-upload-row{background:#0f172a;border-color:#334155;}
body.dark .fm-upload-row .fm-ur-name{color:#e2e8f0;}

/* ====== MOBILE ====== */
@media(max-width:768px){
  .fm-sidebar{width:180px;min-width:140px;}
  .fm-json-panel.open{width:280px;}
  .fm-cards{grid-template-columns:1fr;padding:10px;}
  .fm-tb-search{max-width:160px;}
}
@media(max-width:560px){
  .fm-sidebar{display:none;}
  .fm-json-panel.open{position:fixed;right:0;top:0;bottom:0;width:90vw;z-index:9998;}
}
</style>
</head>
<body>

<div style="display:flex;flex-direction:column;height:100vh;width:100vw;">

  <!-- TITLE BAR -->
  <div class="fm-titlebar">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
    <div class="fm-titlebar-text">Files Manager — Vault Studio</div>
    <button class="fm-titlebar-btn" onclick="toggleDark()" title="Toggle dark mode"><i data-lucide="moon" style="width:16px;height:16px;"></i></button>
    <button class="fm-titlebar-btn" onclick="toggleJsonPanel()" title="Toggle JSON preview"><i data-lucide="code" style="width:16px;height:16px;"></i></button>
  </div>

  <!-- TOOLBAR -->
  <div class="fm-toolbar">
    <div class="fm-tb-group">
      <button class="fm-tb-btn primary" onclick="loadFromBucket()" title="Load from R2 bucket"><i data-lucide="download" style="width:13px;height:13px;"></i> Load</button>
      <button class="fm-tb-btn success" id="deployBtn" onclick="deployToBucket()" title="Save to R2 bucket"><i data-lucide="upload" style="width:13px;height:13px;"></i> Deploy</button>
    </div>
    <div class="fm-tb-sep"></div>
    <div class="fm-tb-group">
      <button class="fm-tb-btn" onclick="exportJSON()" title="Export as JSON file"><i data-lucide="file-down" style="width:13px;height:13px;"></i> Export</button>
      <button class="fm-tb-btn" onclick="importJSON()" title="Import JSON file"><i data-lucide="file-up" style="width:13px;height:13px;"></i> Import</button>
      <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">
    </div>
    <div class="fm-tb-sep"></div>
    <div class="fm-tb-search">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search files, categories..." oninput="filterCards(this.value)">
    </div>
    <div class="fm-tb-right">
      <span style="font-size:11px;color:#64748b;" id="statInfo">0 categories, 0 files</span>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="fm-layout">

    <!-- SIDEBAR -->
    <div class="fm-sidebar">
      <div class="fm-sidebar-head">
        <span>Categories</span>
        <button onclick="addCategory()" title="Add category"><i data-lucide="plus" style="width:14px;height:14px;"></i></button>
      </div>
      <div class="fm-cat-list" id="catList"></div>
    </div>

    <!-- MAIN -->
    <div class="fm-main">
      <div class="fm-cat-header" id="catHeader" style="display:none;">
        <h2 id="catTitle">—</h2>
        <span class="fm-cat-badge" id="catBadge">0 files</span>

<div class="fm-modal-overlay" id="uploadResultsModal">

<!-- LOGIN OVERLAY -->
<div class="fm-modal-overlay show" id="loginOverlay">
  <div class="fm-modal" style="width:360px;">
    <div class="fm-modal-head" style="background:linear-gradient(135deg,#1a73e8,#1557b0);">
      <h3 style="color:#fff;">🔐 Vault Files Manager</h3>
    </div>
    <div class="fm-modal-body" style="padding:24px 20px;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="width:56px;height:56px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;">
          <i data-lucide="lock" style="width:28px;height:28px;color:#1a73e8;"></i>
        </div>
        <p style="font-size:12px;color:#64748b;">Enter your master password to access the file manager</p>
      </div>
      <div>
        <label>Master Password</label>
        <input type="password" id="loginPass" placeholder="Enter master password" style="width:100%;text-align:center;font-size:15px;letter-spacing:2px;" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="loginError" style="color:#dc2626;font-size:12px;text-align:center;display:none;margin-top:4px;"></div>
    </div>
    <div class="fm-modal-foot" style="justify-content:center;">
      <button class="fm-save" onclick="doLogin()" id="loginBtn" style="width:100%;padding:10px;">Unlock</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="fm-toast" id="toast"></div>

<script>
/* ================================================================
   FILES MANAGER — INNOVATIVE files.json EDITOR
   ================================================================ */

var _data = {};
var _activeCat = '';
var _editIdx = -1;
var _searchQ = '';
var _dragCat = '';
var _apiBase = 'https://backend.shinumaths989.workers.dev';

function _getToken(){
  return sessionStorage.getItem('vaultSessionToken')
      || sessionStorage.getItem('vaultSession')
      || '';
}

/* ---- INIT ---- */
(async function(){
  _renderSidebar();
  _updateStats();
  if (typeof lucide !== 'undefined') lucide.createIcons();
  var onDomain = location.origin === 'https://72oe-v2sx.shine-ministry.com';

  // A per-tab sessionStorage token (and in-memory window.masterPassword) is
  // wiped on every reload/new tab, which made files.html show the login
  // screen even though the device was still "remembered" (vaultTrustInfo in
  // localStorage, same as index.html). Try to silently restore that trusted
  // session before falling back to the login overlay.
  if (onDomain && (!_getToken() || !window.masterPassword) &&
      typeof _isTrustDevice === 'function' && _isTrustDevice() &&
      typeof restoreTrustSession === 'function') {
    try { await restoreTrustSession(); } catch(e){ console.warn('[files.html] restoreTrustSession failed:', e); }
  }

  var token = _getToken();
  if (token && onDomain && window.masterPassword){
    document.getElementById('loginOverlay').classList.remove('show');
    _autoLoad();
  } else if (onDomain){
    document.getElementById('loginOverlay').classList.add('show');
    setTimeout(function(){ document.getElementById('loginPass').focus(); }, 100);
  } else {
    goOffline();
  }
})();

/* ---- LOGIN ---- */
async function doLogin(){
  var pass = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  if (!pass){ errEl.textContent = 'Password required'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  btn.textContent = 'Authenticating...';
  btn.disabled = true;
  try {
    var hash = await window.sha256(pass);
    var res = await fetch(_apiBase + '/get-secret', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hash: hash })
    });
    var text = await res.text();
    var result;
    try { result = JSON.parse(text); } catch(pe){
      errEl.innerHTML = 'Cannot reach backend (CORS/firewall). <a href="#" onclick="goOffline()" style="color:#1a73e8;font-weight:600;">Work Offline</a> with cached data.';
      errEl.style.display = 'block';
      btn.textContent = 'Unlock';
      btn.disabled = false;
      return;
    }
    if (!result.success || !result.sessionToken){
      errEl.textContent = result.error || 'Wrong password';
      errEl.style.display = 'block';
      btn.textContent = 'Unlock';
      btn.disabled = false;
      return;
    }
    sessionStorage.setItem('vaultSessionToken', result.sessionToken);
    sessionStorage.setItem('vaultSession', result.sessionToken);
    if (result.secret) window.masterPassword = result.secret;
    document.getElementById('loginOverlay').classList.remove('show');
    btn.textContent = 'Unlock';
    btn.disabled = false;
    toast('Authenticated — loading files...');
    await _autoLoad();
  } catch(e){
    errEl.innerHTML = 'Connection failed. <a href="#" onclick="goOffline()" style="color:#1a73e8;font-weight:600;">Work Offline</a> with cached data.';
    errEl.style.display = 'block';
    btn.textContent = 'Unlock';
    btn.disabled = false;
  }
}

function goOffline(){
  _loadFromStorage();
  document.getElementById('loginOverlay').classList.remove('show');
  var cats = Object.keys(_data);
  if (cats.length) _selectCat(cats[0]);
  document.getElementById('statusRight').textContent = 'Offline mode — editing cached data only';
  toast('Offline mode — changes saved locally only');
}

async function _autoLoad(){
  var token = _getToken();
  if (!token){
    _loadFromStorage();
    var cats = Object.keys(_data);
    if (cats.length) _selectCat(cats[0]);
    document.getElementById('statusRight').textContent = 'No session — using cached data';
    return;
  }
  document.getElementById('statusRight').textContent = 'Loading from R2...';
  try {
    var res = await fetch(_apiBase + '/files.json?_t=' + Date.now(), {
      headers:{'Authorization':'Bearer '+token},
      cache:'no-store'
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    var raw = await res.json();
    if (Array.isArray(raw)){
      var obj = {};
      raw.forEach(function(f){
        var cat = f.category || f.type || 'Documents';
        if (!obj[cat]) obj[cat] = [];
        obj[cat].push(f);
      });
      _data = obj;
    } else if (raw && typeof raw === 'object'){
      _data = raw;
    }
    _saveToStorage();
    _renderSidebar();
    var cats = Object.keys(_data);
    if (cats.length) _selectCat(cats[0]);
    else { document.getElementById('catHeader').style.display = 'none'; document.getElementById('cardsGrid').innerHTML = ''; }
    _updateJson();
    _updateStats();
    document.getElementById('statusRight').textContent = 'Loaded from R2 at '+new Date().toLocaleTimeString();
    toast('Loaded '+cats.length+' categories from R2');
  } catch(e){
    _loadFromStorage();
    var cats = Object.keys(_data);
    if (cats.length) _selectCat(cats[0]);
    document.getElementById('statusRight').textContent = 'Offline — using cached data';
    toast('Offline — loaded cached data');
  }
}

/* ---- MEMBER CHIPS TOGGLE ---- */
document.getElementById('fmMembers').addEventListener('click', function(e){
  var chip = e.target.closest('.fm-member-chip');
  if (!chip) return;
  var cb = chip.querySelector('input');
  cb.checked = !cb.checked;
  chip.classList.toggle('on', cb.checked);
  chip.classList.toggle('off', !cb.checked);
});

/* ---- LOCAL STORAGE ---- */
function _saveToStorage(){ try { localStorage.setItem('filesManagerData', JSON.stringify(_data)); } catch(e){} }
function _loadFromStorage(){ try { _data = JSON.parse(localStorage.getItem('filesManagerData') || '{}'); } catch(e){ _data = {}; } }

/* ---- SIDEBAR ---- */
function _renderSidebar(){
  var el = document.getElementById('catList');
  var cats = Object.keys(_data);
  el.innerHTML = cats.map(function(c){
    var cnt = Array.isArray(_data[c]) ? _data[c].length : 0;
    var active = c === _activeCat ? ' active' : '';
    return '<div class="fm-cat-item'+active+'" data-cat="'+_esc(c)+'" onclick="_selectCat(\''+_esc(c).replace(/'/g,"\\'")+'\')" draggable="true" ondragstart="_catDragStart(event,\''+_esc(c).replace(/'/g,"\\'")+'\')" ondragover="event.preventDefault()" ondrop="_catDrop(event,\''+_esc(c).replace(/'/g,"\\'")+'\')">'
      + _catIcon(c)
      + '<span>'+_esc(c)+'</span>'
      + '<span class="fm-cat-count">'+cnt+'</span>'
      + '<button class="fm-cat-del" onclick="event.stopPropagation();deleteSingleCategory(\''+_esc(c).replace(/'/g,"\\'")+'\')" title="Delete"><i data-lucide="x" style="width:12px;height:12px;"></i></button>'
      + '</div>';
  }).join('');
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

/* ---- PHOTOS category auto-routing ----
   The main vault app (features.js / vault-data.js) decides whether to fetch
   a file from /photos/ or /docs/ purely by checking file.category === 'PHOTOS'
   (exact, case-sensitive) — category being whatever the object key in
   files.json is. If this category was ever created as "Photos" or "photos"
   instead of exactly "PHOTOS", every file in it silently fell back to /docs/,
   even though the Add/Edit File modal's prefix dropdown said "photos/".
   That dropdown never actually forced anything - it was purely cosmetic.
   These helpers make the prefix automatic and tied to the category name,
   so it can't drift out of sync again. */
function _isPhotosCategory(cat){
  return String(cat || '').trim().toUpperCase() === 'PHOTOS';
}
function _prefixForActiveCat(){
  return _isPhotosCategory(_activeCat) ? 'photos/' : 'docs/';
}

function _catIcon(c){
  var icons = {passport:'plane',visa:'plane',finance:'wallet',school:'graduation-cap',personal:'user',residence:'home',church:'cross',education:'book-open',identity:'contact',legal:'scale','financial':'credit-card',ministry:'bird',medical:'stethoscope',insurance:'shield',tax:'clipboard-list',property:'home',vehicle:'car',travel:'globe',work:'briefcase',bank:'landmark',documents:'file-text',certificates:'award',photos:'camera',home:'home',profile:'user'};
  var key = Object.keys(icons).find(function(k){ return c.toLowerCase().indexOf(k) !== -1; });
  var icon = key ? icons[key] : 'folder';
  return '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>';
}

/* ---- SELECT CATEGORY ---- */
function _selectCat(cat){
  _activeCat = cat;
  _renderSidebar();
  document.getElementById('catHeader').style.display = 'flex';
  document.getElementById('catTitle').textContent = cat;
  var items = Array.isArray(_data[cat]) ? _data[cat] : [];
  document.getElementById('catBadge').textContent = items.length + ' file' + (items.length !== 1 ? 's' : '');
  _renderCards();
  _updateJson();
  _updateStats();
}

/* ---- RENDER CARDS ---- */
function _renderCards(){
  var grid = document.getElementById('cardsGrid');
  var items = Array.isArray(_data[_activeCat]) ? _data[_activeCat] : [];
  var q = _searchQ.toLowerCase();

  var filtered = items.map(function(it,i){ return {it:it,idx:i}; }).filter(function(o){
    if (!q) return true;
    return (o.it.name||'').toLowerCase().indexOf(q)!==-1
        || (o.it.file||'').toLowerCase().indexOf(q)!==-1
        || (o.it.member||'').toLowerCase().indexOf(q)!==-1
        || _activeCat.toLowerCase().indexOf(q)!==-1;
  });

  if (!filtered.length){
    grid.innerHTML = '<div class="fm-empty"><i data-lucide="folder-open" style="width:48px;height:48px;"></i><h3>'+(q?'No matching files':'No files yet')+'</h3><p>'+(q?'Try a different search':'Click "+ Add File" to create your first entry')+'</p></div>';
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }

  var html = filtered.map(function(o){
    var it = o.it;
    var idx = o.idx;
    var members = Array.isArray(it.members) ? it.members : (it.member ? [it.member] : []);
    var allM = ['shineil','brother','father','mother'];
    var memberChips = allM.map(function(m){
      var on = members.indexOf(m) !== -1;
      return '<span class="fm-member-chip '+(on?'on':'off')+'" onclick="toggleFileMember('+idx+',\''+m+'\')">'+m+'</span>';
    }).join('');

    var dateStr = it.date || '';

    var st = it._uid ? _uploadStatus[it._uid] : null;
    var badgeHtml = '';
    if (st && (st.state==='pending' || st.state==='failed')){
      var badgeTitle = st.state==='pending' ? 'Not yet uploaded to R2 — click Deploy' : ('Upload failed: '+(st.detail||'unknown error'));
      badgeHtml = '<span class="fm-upload-badge '+st.state+'" title="'+_esc(badgeTitle)+'"></span>';
    } else if (st && st.state==='success'){
      badgeHtml = '<span class="fm-upload-badge success" title="Uploaded to R2"></span>';
    }

    return '<div class="fm-card" draggable="true" ondragstart="_fileDragStart(event,'+idx+')" ondragover="event.preventDefault();this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="_fileDrop(event,'+idx+');this.classList.remove(\'drag-over\')">'
      + badgeHtml
      + '<div class="fm-card-actions">'
      + '  <button class="fm-card-act" onclick="moveFileEntry('+idx+',-1)" title="Move up"'+(idx===0?' disabled':'')+'><i data-lucide="arrow-up" style="width:13px;height:13px;"></i></button>'
      + '  <button class="fm-card-act" onclick="moveFileEntry('+idx+',1)" title="Move down"'+(idx===filtered.length-1?' disabled':'')+'><i data-lucide="arrow-down" style="width:13px;height:13px;"></i></button>'
      + '  <button class="fm-card-act" onclick="editFileEntry('+idx+')" title="Edit"><i data-lucide="pencil" style="width:13px;height:13px;"></i></button>'
      + '  <button class="fm-card-act" onclick="duplicateFileEntry('+idx+')" title="Duplicate"><i data-lucide="copy" style="width:13px;height:13px;"></i></button>'
      + '  <button class="fm-card-act del" onclick="deleteFileEntry('+idx+')" title="Delete"><i data-lucide="trash-2" style="width:13px;height:13px;"></i></button>'
      + '</div>'
      + '<div class="fm-card-top">'
      + '  <div class="fm-card-icon"><i data-lucide="file-text" style="width:20px;height:20px;"></i></div>'
      + '  <div class="fm-card-info">'
      + '    <div class="fm-card-name" title="'+_esc(it.name||'')+'">'+_esc(it.name||'Untitled')+'</div>'
      + '    <div class="fm-card-file" title="'+_esc(it.file||'')+'">'+_esc(it.file||'—')+'</div>'
      + '  </div>'
      + '</div>'
      + '<div class="fm-card-meta">'
      + (dateStr ? '<span><i data-lucide="calendar" style="width:11px;height:11px;"></i> '+dateStr+'</span>' : '')
      + '</div>'
      + '<div class="fm-card-members">'+memberChips+'</div>'
      + '</div>';
  }).join('');

  /* add-card button */
  html += '<div class="fm-add-card" onclick="addFileEntry()"><i data-lucide="plus" style="width:24px;height:24px;"></i><span>Add File</span></div>';

  grid.innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

/* ---- FILTER ---- */
function filterCards(q){
  _searchQ = q;
  _renderCards();
}

/* ---- ADD CATEGORY ---- */
function addCategory(){
  var name = prompt('Category name:');
  if (!name || !name.trim()) return;
  name = name.trim();
  /* Force exact "PHOTOS" casing so the vault app's file.category === 'PHOTOS'
     check (features.js / vault-data.js) always matches and routes to /photos/. */
  if (_isPhotosCategory(name)) name = 'PHOTOS';
  if (_data[name]){ toast('Category already exists'); return; }
  _data[name] = [];
  _saveToStorage();
  _renderSidebar();
  _selectCat(name);
  toast('Category "'+name+'" created');
}

/* ---- RENAME CATEGORY ---- */
function renameCategory(){
  if (!_activeCat) return;
  var name = prompt('Rename category:', _activeCat);
  if (!name || !name.trim() || name.trim() === _activeCat) return;
  name = name.trim();
  if (_isPhotosCategory(name)) name = 'PHOTOS';
  name = name.trim();
  if (_data[name]){ toast('Category already exists'); return; }
  _data[name] = _data[_activeCat];
  delete _data[_activeCat];
  _saveToStorage();
  _renderSidebar();
  _selectCat(name);
  toast('Renamed to "'+name+'"');
}

/* ---- DELETE CATEGORY ---- */
function deleteCategory(){
  if (!_activeCat) return;
  if (!confirm('Delete category "'+_activeCat+'" and all its files?')) return;
  delete _data[_activeCat];
  _activeCat = '';
  _saveToStorage();
  _renderSidebar();
  document.getElementById('catHeader').style.display = 'none';
  document.getElementById('cardsGrid').innerHTML = '';
  _updateJson();
  _updateStats();
  var cats = Object.keys(_data);
  if (cats.length) _selectCat(cats[0]);
  toast('Category deleted');
}

function deleteSingleCategory(cat){
  if (!confirm('Delete category "'+cat+'" and all its files?')) return;
  delete _data[cat];
  if (_activeCat === cat) _activeCat = '';
  _saveToStorage();
  _renderSidebar();
  document.getElementById('catHeader').style.display = 'none';
  document.getElementById('cardsGrid').innerHTML = '';
  _updateJson();
  _updateStats();
  var cats = Object.keys(_data);
  if (cats.length) _selectCat(cats[0]);
  toast('Category deleted');
}

/* ---- ADD FILE ---- */
function addFileEntry(){
  _editIdx = -1;
  document.getElementById('fileModalTitle').textContent = 'Add File Entry';
  document.getElementById('fmName').value = '';
  document.getElementById('fmPrefix').value = _prefixForActiveCat();
  document.getElementById('fmPrefix').disabled = true;
  document.getElementById('fmFile').value = '';
  document.getElementById('fmDate').value = new Date().toISOString().slice(0,10);
  _resetMemberChips(['shineil','brother','father','mother']);
  document.getElementById('fileModal').classList.add('show');
}

/* ---- EDIT FILE ---- */
function editFileEntry(idx){
  var items = _data[_activeCat];
  if (!items || !items[idx]) return;
  var it = items[idx];
  _editIdx = idx;
  document.getElementById('fileModalTitle').textContent = 'Edit File Entry';
  document.getElementById('fmName').value = it.name || '';
  var filePath = it.file || '';
  var fileName = filePath;
  /* Strip any legacy stored prefix from the filename itself — the prefix is
     no longer inferred from the stored path, it is always derived from the
     category (see _prefixForActiveCat), so PHOTOS files always resolve to
     /photos/ and everything else always resolves to /docs/. */
  ['photos/','docs/','file/'].forEach(function(p){
    if (filePath.indexOf(p) === 0){ fileName = filePath.slice(p.length); }
  });
  document.getElementById('fmPrefix').value = _prefixForActiveCat();
  document.getElementById('fmPrefix').disabled = true;
  document.getElementById('fmFile').value = fileName;
  document.getElementById('fmDate').value = it.date || '';
  var members = Array.isArray(it.members) ? it.members : (it.member ? [it.member] : ['shineil']);
  _resetMemberChips(members);
  document.getElementById('fileModal').classList.add('show');
}

/* ---- DUPLICATE FILE ---- */
function duplicateFileEntry(idx){
  var items = _data[_activeCat];
  if (!items || !items[idx]) return;
  var copy = JSON.parse(JSON.stringify(items[idx]));
  copy.name = (copy.name || 'File') + ' (copy)';
  items.splice(idx + 1, 0, copy);
  _saveToStorage();
  _renderCards();
  _updateJson();
  _updateStats();
  toast('File duplicated');
}

/* ---- DELETE FILE ---- */
function deleteFileEntry(idx){
  if (!confirm('Delete this file entry?')) return;
  _data[_activeCat].splice(idx, 1);
  _saveToStorage();
  _renderCards();
  _updateJson();
  _updateStats();
  document.getElementById('catBadge').textContent = _data[_activeCat].length + ' files';
  toast('File deleted');
}

/* ---- SAVE FILE ---- */
function saveFileEntry(){
  var name = document.getElementById('fmName').value.trim();
  /* Prefix is always derived from the active category (PHOTOS -> photos/,
     everything else -> docs/), never read from the dropdown — this is what
     keeps the bucket key and the file.category-based routing in the main
     vault app permanently in sync, regardless of file type. */
  var prefix = _prefixForActiveCat();
  var fileName = document.getElementById('fmFile').value.trim();
  var date = document.getElementById('fmDate').value;
  if (!name){ toast('Name is required'); return; }
  if (!fileName){ toast('File name is required'); return; }

  var members = _getSelectedMembers();
  if (!members.length) members = ['shineil'];

  var entry = { name:name, file:fileName, members:members };
  if (date) entry.date = date;

  /* preserve stable id across edits so upload status can be tracked per-entry */
  var existingUid = (_editIdx >= 0 && _data[_activeCat] && _data[_activeCat][_editIdx]) ? _data[_activeCat][_editIdx]._uid : null;
  entry._uid = existingUid || ('u_' + Date.now().toString(36) + Math.random().toString(36).slice(2,8));

  if (_pendingEncBlob){
    var uploadPath = prefix.replace(/\/$/, '') + '/' + fileName;
    uploadPath = uploadPath.replace(/^(docs|file)\//, '');
    _pendingUploads.push({ uid: entry._uid, path: uploadPath, blob: _pendingEncBlob, origName: _pendingOrigName || fileName, cat: _activeCat, size: _pendingEncBlob.size, attempts: 0 });
    _uploadStatus[entry._uid] = { state:'pending' };
    _updateDeployBadge();
    toast('Encrypted file queued for upload');
  }

  if (!_data[_activeCat]) _data[_activeCat] = [];

  if (_editIdx >= 0){
    _data[_activeCat][_editIdx] = entry;
    toast('File updated');
  } else {
    _data[_activeCat].push(entry);
    toast('File added');
  }

  _saveToStorage();
  _renderCards();
  _updateJson();
  _updateStats();
  document.getElementById('catBadge').textContent = _data[_activeCat].length + ' files';
  closeFileModal();
}

function closeFileModal(){
  document.getElementById('fileModal').classList.remove('show');
  _editIdx = -1;
  clearFileUpload();
}

/* ---- FILE UPLOAD & ENCRYPT ---- */
var _pendingEncBlob = null;
var _pendingOrigName = '';

function handleFileSelect(e){
  var file = e.target.files[0];
  if (!file) return;
  processUploadFile(file);
  e.target.value = '';
}

function handleFileDrop(e){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var file = e.dataTransfer.files[0];
  if (!file) return;
  processUploadFile(file);
}

async function processUploadFile(file){
  var name = file.name;
  var encName = name.replace(/\.[^.]+$/, '') + '.enc';
  document.getElementById('fmName').value = name.replace(/\.[^.]+$/, '');
  document.getElementById('fmFile').value = encName;
  document.getElementById('fmFileInfoText').textContent = name + ' → ' + encName + ' (encrypting...)';
  document.getElementById('fmFileInfo').style.display = 'flex';
  document.getElementById('fmUploadArea').style.display = 'none';
  if (typeof lucide !== 'undefined') lucide.createIcons();

  var pass = window.masterPassword;
  if (!pass){
    toast('Enter master password first — click Unlock');
    clearFileUpload();
    document.getElementById('loginOverlay').classList.add('show');
    document.getElementById('loginPass').focus();
    return;
  }

  try {
    var arrayBuf = await file.arrayBuffer();
    _pendingEncBlob = await encryptVaultFile(arrayBuf, pass);
    _pendingOrigName = name;
    document.getElementById('fmFileInfoText').textContent = name + ' → ' + encName + ' (encrypted, ready to deploy)';
    toast('File encrypted successfully');
  } catch(e){
    toast('Encryption failed: ' + e.message);
    clearFileUpload();
  }
}

async function encryptVaultFile(data, password){
  var enc = new TextEncoder();
  var passwordHash = new Uint8Array(await crypto.subtle.digest('SHA-256', enc.encode(password)));
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  var keyMaterial = await crypto.subtle.importKey('raw', passwordHash, 'PBKDF2', false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:300000,hash:'SHA-256'}, keyMaterial, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
  var encrypted = await crypto.subtle.encrypt({name:'AES-GCM',iv:iv}, key, data);
  var settings = {version:2,method:'HASH_DERIVED_KEY',algorithm:'AES-GCM',hash:'SHA-256',iterations:300000};
  var settingsBytes = new TextEncoder().encode(JSON.stringify(settings));
  var settingsLength = new Uint32Array([settingsBytes.length]);
  return new Blob([settingsLength,settingsBytes,salt,iv,new Uint8Array(encrypted)],{type:'application/octet-stream'});
}

function clearFileUpload(){
  _pendingEncBlob = null;
  _pendingOrigName = '';
  document.getElementById('fmFileInfo').style.display = 'none';
  document.getElementById('fmUploadArea').style.display = 'flex';
}

function _updateDeployBadge(){
  var btn = document.getElementById('deployBtn');
  if (!btn) return;
  var n = _pendingUploads.length;
  btn.innerHTML = '<i data-lucide="upload" style="width:13px;height:13px;"></i> Deploy' + (n ? ' ('+n+')' : '');
  if (typeof lucide !== 'undefined') lucide.createIcons({ node: btn });
}

/* ---- MEMBER CHIP HELPERS ---- */
function _resetMemberChips(arr){
  document.querySelectorAll('#fmMembers .fm-member-chip').forEach(function(el){
    var m = el.dataset.m;
    var on = arr.indexOf(m) !== -1;
    el.classList.toggle('on', on);
    el.classList.toggle('off', !on);
    el.querySelector('input').checked = on;
  });
}

function _getSelectedMembers(){
  var r = [];
  document.querySelectorAll('#fmMembers .fm-member-chip.on').forEach(function(el){ r.push(el.dataset.m); });
  return r;
}

/* ---- TOGGLE MEMBER ON CARD ---- */
function toggleFileMember(idx, member){
  var it = _data[_activeCat][idx];
  if (!it) return;
  if (!it.members) it.members = it.member ? [it.member] : [];
  var i = it.members.indexOf(member);
  if (i !== -1) it.members.splice(i, 1);
  else it.members.push(member);
  _saveToStorage();
  _renderCards();
  _updateJson();
}

/* ---- EXPORT ---- */
function _stripInternalFields(data){
  var out = {};
  Object.keys(data).forEach(function(cat){
    out[cat] = (data[cat]||[]).map(function(it){ var c = Object.assign({}, it); delete c._uid; return c; });
  });
  return out;
}
function exportJSON(){
  var blob = new Blob([JSON.stringify(_stripInternalFields(_data), null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'files.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported files.json');
}

/* ---- IMPORT ---- */
function importJSON(){
  document.getElementById('importFileInput').click();
}

function handleImportFile(e){
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try {
      var obj = JSON.parse(ev.target.result);
      if (typeof obj !== 'object' || obj === null || Array.isArray(obj)){
        toast('Invalid files.json format');
        return;
      }
      _data = obj;
      _saveToStorage();
      _renderSidebar();
      var cats = Object.keys(_data);
      if (cats.length) _selectCat(cats[0]);
      else { document.getElementById('catHeader').style.display = 'none'; document.getElementById('cardsGrid').innerHTML = ''; }
      _updateJson();
      _updateStats();
      toast('Imported '+cats.length+' categories');
    } catch(err){
      toast('Parse error: '+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ---- BUCKET LOAD/DEPLOY ---- */
async function loadFromBucket(){
  var token = _getToken();
  if (!token){ toast('No active session — log in first'); return; }
  toast('Loading from bucket...');
  try {
    var res = await fetch(_apiBase + '/files.json?_t='+Date.now(), {
      headers:{'Authorization':'Bearer '+token},
      cache:'no-store'
    });
    if (!res.ok) throw new Error('HTTP '+res.status);
    var raw = await res.json();
    if (Array.isArray(raw)){
      var obj = {};
      raw.forEach(function(f){
        var cat = f.category || f.type || 'Documents';
        if (!obj[cat]) obj[cat] = [];
        obj[cat].push(f);
      });
      _data = obj;
    } else if (raw && typeof raw === 'object'){
      _data = raw;
    }
    _saveToStorage();
    _renderSidebar();
    var cats = Object.keys(_data);
    if (cats.length) _selectCat(cats[0]);
    else { document.getElementById('catHeader').style.display = 'none'; document.getElementById('cardsGrid').innerHTML = ''; }
    _updateJson();
    _updateStats();
    document.getElementById('statusRight').textContent = 'Loaded from bucket at '+new Date().toLocaleTimeString();
    toast('Loaded '+cats.length+' categories from bucket');
  } catch(e){
    toast('Load failed: '+e.message);
  }
}

/* ---- PENDING FILE UPLOADS ---- */
var _pendingUploads = [];
var _uploadStatus = {}; /* uid -> {state:'pending'|'success'|'failed', detail:string} */

function _sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

/* Upload a single file with retries + exponential backoff.
   This is the fix for R2 uploads failing intermittently: a single fetch()
   with no retry meant any transient network blip, R2 5xx, or an
   auth token that expired partway through a long batch (uploads ran
   sequentially with no refresh) permanently dropped that file — while the
   file's metadata entry still got written into files.json, leaving
   index.html pointing at an object that was never actually written to R2
   (which is what caused "failed to decrypt and open" on those files). */
async function _uploadOne(u, token){
  var maxAttempts = 3;
  var lastErr = '';
  for (var attempt = 1; attempt <= maxAttempts; attempt++){
    u.attempts = attempt;
    try {
      var uploadPath = u.path.replace(/^(docs|file)\//, '');
      var res = await fetch(_apiBase + '/upload/' + uploadPath, {
        method:'PUT',
        headers:{'Authorization':'Bearer '+token,'Content-Type':'application/octet-stream'},
        body: u.blob
      });
      if (res.ok) return { ok:true };
      if (res.status === 401 || res.status === 403){
        /* token expired/invalid mid-batch — retrying won't help, surface immediately */
        lastErr = 'HTTP '+res.status+' — session expired, please log in again';
        break;
      }
      lastErr = 'HTTP '+res.status;
    } catch(e){
      lastErr = e && e.message ? e.message : 'network error';
    }
    if (attempt < maxAttempts) await _sleep(400 * Math.pow(2, attempt - 1)); /* 400ms, 800ms backoff */
  }
  return { ok:false, error:lastErr };
}

async function deployToBucket(){
  var token = _getToken();
  if (!token){ toast('No active session — log in first'); return; }
  var uploadCount = _pendingUploads.length;
  var msg = uploadCount
    ? 'Upload '+uploadCount+' file(s) and deploy files.json to R2?'
    : 'Deploy files.json to R2? This overwrites the remote version.';
  if (!confirm(msg)) return;
  toast('Deploying...');
  try {
    var results = [];
    var stillPending = [];
    for (var i = 0; i < _pendingUploads.length; i++){
      var u = _pendingUploads[i];
      var r = await _uploadOne(u, token);
      if (r.ok){
        _uploadStatus[u.uid] = { state:'success' };
        results.push({ name:u.origName, path:u.path, ok:true, uid:u.uid });
      } else {
        _uploadStatus[u.uid] = { state:'failed', detail:r.error };
        results.push({ name:u.origName, path:u.path, ok:false, uid:u.uid, error:r.error });
        stillPending.push(u); /* keep failed uploads queued so they can be retried, don't silently drop them */
      }
    }
    _pendingUploads = stillPending;
    _updateDeployBadge();
    _renderCards();

    /* Build the payload to send to R2: strip out any entry whose file upload
       just failed, so files.json on the server never references an object
       that doesn't actually exist in the bucket. Failed entries stay in the
       local editor (flagged red) until the upload is retried and succeeds. */
    var failedUids = {};
    results.forEach(function(r){ if (!r.ok) failedUids[r.uid] = true; });
    var payload = JSON.parse(JSON.stringify(_data));
    Object.keys(payload).forEach(function(cat){
      payload[cat] = payload[cat].filter(function(it){ return !(it._uid && failedUids[it._uid]); })
        .map(function(it){ var c = Object.assign({}, it); delete c._uid; return c; });
    });

    var res2 = await fetch(_apiBase + '/upload/files.json', {
      method:'PUT',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body: JSON.stringify(payload, null, 2)
    });
    if (!res2.ok) throw new Error('files.json upload failed: HTTP '+res2.status);

    var okCount = results.filter(function(r){ return r.ok; }).length;
    var failCount = results.length - okCount;
    document.getElementById('statusRight').textContent = 'Deployed at '+new Date().toLocaleTimeString();
    toast(failCount ? (okCount+' uploaded, '+failCount+' failed — see details') : (results.length ? 'files.json deployed, all files uploaded!' : 'files.json deployed!'));

    if (results.length) _showUploadResults(results);
  } catch(e){
    toast('Deploy failed: '+e.message);
  }
}

/* ---- UPLOAD RESULTS INDICATOR ---- */
function _showUploadResults(results){
  var okCount = results.filter(function(r){ return r.ok; }).length;
  var failCount = results.length - okCount;
  document.getElementById('urSummary').innerHTML =
    '<span class="ok"><i data-lucide="check-circle" style="width:13px;height:13px;vertical-align:middle;"></i> '+okCount+' succeeded</span>'
    + (failCount ? '<span class="err"><i data-lucide="x-circle" style="width:13px;height:13px;vertical-align:middle;"></i> '+failCount+' failed</span>' : '');

  var list = results.map(function(r){
    var icon = r.ok
      ? '<i data-lucide="check-circle" style="width:16px;height:16px;"></i>'
      : '<i data-lucide="x-circle" style="width:16px;height:16px;"></i>';
    var detail = r.ok ? r.path : (r.path + ' — ' + (r.error||'upload failed'));
    return '<div class="fm-upload-row '+(r.ok?'ok':'err')+'">'
      + '<span class="fm-ur-icon">'+icon+'</span>'
      + '<div class="fm-ur-info"><div class="fm-ur-name" title="'+_esc(r.name)+'">'+_esc(r.name)+'</div><div class="fm-ur-detail" title="'+_esc(detail)+'">'+_esc(detail)+'</div></div>'
      + (r.ok ? '' : '')
      + '</div>';
  }).join('');
  document.getElementById('urList').innerHTML = list;
  document.getElementById('urRetryAllBtn').style.display = failCount ? 'inline-block' : 'none';
  document.getElementById('uploadResultsModal').classList.add('show');
  if (typeof lucide !== 'undefined') lucide.createIcons({ node: document.getElementById('uploadResultsModal') });
}

function closeUploadResultsModal(){
  document.getElementById('uploadResultsModal').classList.remove('show');
}

function retryFailedUploads(){
  closeUploadResultsModal();
  if (!_pendingUploads.length){ toast('Nothing to retry'); return; }
  deployToBucket();
}

/* ---- JSON PANEL ---- */
function toggleJsonPanel(){
  document.getElementById('jsonPanel').classList.toggle('open');
  _updateJson();
}

function _updateJson(){
  var panel = document.getElementById('jsonPanel');
  if (!panel.classList.contains('open')) return;
  var str = JSON.stringify(_stripInternalFields(_data), null, 2);
  document.getElementById('jsonPre').innerHTML = _syntaxHighlight(str);
}

function _syntaxHighlight(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)"(?=\s*:)/g, '<span class="jk">"$1"</span>')
    .replace(/"([^"]*)"/g, '<span class="js">"$1"</span>')
    .replace(/\b(\d+)\b/g, '<span class="jn">$1</span>')
    .replace(/\b(true|false|null)\b/g, '<span class="jb">$1</span>');
}

/* ---- DARK MODE ---- */
function toggleDark(){
  document.body.classList.toggle('dark');
  localStorage.setItem('filesManagerDark', document.body.classList.contains('dark') ? '1' : '0');
}
(function(){
  if (localStorage.getItem('filesManagerDark') === '1') document.body.classList.add('dark');
})();

/* ---- MOVE FILE UP/DOWN (mobile-friendly reorder, no drag needed) ---- */
function moveFileEntry(idx, dir){
  var items = _data[_activeCat];
  if (!Array.isArray(items)) return;
  var target = idx + dir;
  if (target < 0 || target >= items.length) return;
  var tmp = items[idx];
  items[idx] = items[target];
  items[target] = tmp;
  _saveToStorage();
  _renderCards();
  _updateJson();
}

/* ---- DRAG & DROP FILES ---- */
var _dragIdx = -1;
function _fileDragStart(e, idx){ _dragIdx = idx; e.dataTransfer.effectAllowed = 'move'; }
function _fileDrop(e, targetIdx){
  e.preventDefault();
  if (_dragIdx < 0 || _dragIdx === targetIdx) return;
  var items = _data[_activeCat];
  var moved = items.splice(_dragIdx, 1)[0];
  items.splice(targetIdx, 0, moved);
  _dragIdx = -1;
  _saveToStorage();
  _renderCards();
  _updateJson();
}

/* ---- DRAG & DROP CATEGORIES ---- */
function _catDragStart(e, cat){ _dragCat = cat; e.dataTransfer.effectAllowed = 'move'; }
function _catDrop(e, targetCat){
  e.preventDefault();
  if (!_dragCat || _dragCat === targetCat) return;
  var keys = Object.keys(_data);
  var fromIdx = keys.indexOf(_dragCat);
  var toIdx = keys.indexOf(targetCat);
  if (fromIdx < 0 || toIdx < 0) return;
  var newObj = {};
  keys.forEach(function(k,i){
    if (i === fromIdx) return;
    if (i < toIdx || (i > fromIdx && i <= toIdx)) newObj[k] = _data[k];
  });
  newObj[_dragCat] = _data[_dragCat];
  keys.forEach(function(k,i){
    if (newObj[k]) return;
    if (i > toIdx || i < fromIdx) newObj[k] = _data[k];
  });
  _data = newObj;
  _dragCat = '';
  _saveToStorage();
  _renderSidebar();
  _updateJson();
}

/* ---- HELPERS ---- */
function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function _updateStats(){
  var cats = Object.keys(_data).length;
  var files = 0;
  Object.values(_data).forEach(function(arr){ if (Array.isArray(arr)) files += arr.length; });
  document.getElementById('statInfo').textContent = cats+' categories, '+files+' files';
}

function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.classList.remove('show'); }, 2200);
}

/* ---- KEYBOARD ---- */
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape') closeFileModal();
  if (e.key === 'n' && (e.ctrlKey || e.metaKey)){
    e.preventDefault();
    if (_activeCat) addFileEntry();
  }
});
</script>
