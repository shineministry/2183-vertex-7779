<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Publisher</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
    .container { background: #fff; border-radius: 16px; padding: 32px; width: 100%; max-width: 640px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    h1 { font-size: 22px; color: #0f172a; margin-bottom: 4px; }
    .sub { color: #64748b; font-size: 13px; margin-bottom: 24px; }

    /* Login gate */
    #loginGate { text-align: center; padding: 40px 0; }
    #loginGate input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none; }
    #loginGate input:focus { border-color: #3b82f6; }
    #loginGate .btn { background: #3b82f6; color: #fff; border: none; border-radius: 10px; padding: 12px 32px; font-size: 15px; font-weight: 600; cursor: pointer; }
    #loginGate .btn:hover { background: #2563eb; }
    #loginGate .error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }

    /* Main UI */
    #mainUI { display: none; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .toolbar .btn { background: #3b82f6; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .toolbar .btn:hover { background: #2563eb; }
    .toolbar .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #475569; }
    .toolbar .btn-outline:hover { border-color: #3b82f6; color: #3b82f6; }
    .toolbar .btn-danger { background: #ef4444; }
    .toolbar .btn-danger:hover { background: #dc2626; }
    .toolbar .badge { margin-left: auto; align-self: center; font-size: 13px; color: #64748b; }

    /* Form */
    .form-card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; }
    .form-card.open { display: block; }
    .form-card h3 { font-size: 15px; color: #0f172a; margin-bottom: 14px; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #3b82f6; }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-row-inline { display: flex; gap: 12px; }
    .form-row-inline > * { flex: 1; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    .form-actions .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .form-actions .btn-primary { background: #3b82f6; color: #fff; }
    .form-actions .btn-primary:hover { background: #2563eb; }
    .form-actions .btn-cancel { background: #e2e8f0; color: #475569; }
    .form-actions .btn-cancel:hover { background: #cbd5e1; }

    /* Notification list */
    .notif-list { display: flex; flex-direction: column; gap: 10px; }
    .notif-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }
    .notif-item .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; background: #dbeafe; color: #1d4ed8; flex-shrink: 0; margin-top: 2px; }
    .notif-item .tag.targeted { background: #fef3c7; color: #b45309; }
    .notif-item .body { flex: 1; }
    .notif-item .body strong { font-size: 14px; color: #0f172a; }
    .notif-item .body p { font-size: 13px; color: #64748b; margin-top: 2px; }
    .notif-item .body .meta { font-size: 11px; color: #94a3b8; margin-top: 4px; }
    .notif-item .actions { display: flex; gap: 6px; flex-shrink: 0; }
    .notif-item .actions button { background: none; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; color: #475569; }
    .notif-item .actions button:hover { border-color: #3b82f6; color: #3b82f6; }
    .notif-item .actions button.del:hover { border-color: #ef4444; color: #ef4444; }
    .empty { text-align: center; color: #94a3b8; padding: 40px 0; font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,.3); display: none; z-index: 999; }
    .toast.show { display: block; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔔 Notification Publisher</h1>
  <div class="sub">Publish vault notifications that appear on all user devices</div>

  <!-- Login Gate -->
  <div id="loginGate">
    <input type="password" id="adminKeyInput" placeholder="Enter admin key" autocomplete="off">
    <button class="btn" onclick="login()">Unlock</button>
    <div class="error" id="loginError">Invalid key</div>
  </div>

  <!-- Main UI -->
  <div id="mainUI">
    <div class="toolbar">
      <button class="btn" onclick="openAddForm()">+ New Notification</button>
      <button class="btn btn-outline" onclick="loadNotifications()">↻ Refresh</button>
      <button class="btn btn-danger" onclick="publishAll()" id="publishBtn">⬆ Publish to Server</button>
      <span class="badge" id="notifCount">0 notifications</span>
    </div>

    <!-- Add/Edit Form -->
    <div class="form-card" id="formCard">
      <h3 id="formTitle">New Notification</h3>
      <div class="form-row form-row-inline">
        <div style="flex:2"><label>Title</label><input type="text" id="fTitle" placeholder="e.g. New Document Available"></div>
        <div style="flex:1"><label>Type</label><select id="fType"><option value="global">Global</option><option value="targeted">Targeted</option></select></div>
      </div>
      <div class="form-row"><label>Body</label><textarea id="fBody" placeholder="Notification message..."></textarea></div>
      <div class="form-row" id="targetsRow" style="display:none"><label>Targets (comma-separated usernames)</label><input type="text" id="fTargets" placeholder="user1, user2, all"></div>
      <div class="form-actions">
        <button class="btn-sm btn-cancel" onclick="closeForm()">Cancel</button>
        <button class="btn-sm btn-primary" onclick="saveForm()">Save</button>
      </div>
    </div>

    <!-- Notification List -->
    <div class="notif-list" id="notifList">
      <div class="empty">No notifications yet. Click "+ New Notification" to create one.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://backend.shinumaths989.workers.dev';
let adminKey = '';
let notifications = [];
let editingId = null;

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

function login() {
  const key = document.getElementById('adminKeyInput').value.trim();
  if (!key) return;
  adminKey = key;
  // Immediate unlock (server validates on publish)
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('mainUI').style.display = 'block';
  loadNotifications();
}

function loadNotifications() {
  fetch(`${WORKER_URL}/get-notifications`)
    .then(r => r.ok ? r.json() : [])
    .then(data => {
      notifications = Array.isArray(data) ? data : [];
      renderList();
    })
    .catch(() => { notifications = []; renderList(); });
}

function renderList() {
  const list = document.getElementById('notifList');
  document.getElementById('notifCount').textContent = notifications.length + ' notification' + (notifications.length !== 1 ? 's' : '');
  if (notifications.length === 0) {
    list.innerHTML = '<div class="empty">No notifications yet. Click "+ New Notification" to create one.</div>';
    return;
  }
  list.innerHTML = notifications.map((n, i) => {
    const tag = n.type === 'targeted' ? '<span class="tag targeted">Targeted</span>' : '<span class="tag">Global</span>';
    const targets = n.targets ? `<br><span class="meta">Targets: ${n.targets}</span>` : '';
    return `<div class="notif-item">
      ${tag}
      <div class="body"><strong>${escHtml(n.title)}</strong><p>${escHtml(n.body)}</p><span class="meta">${new Date(n.timestamp || Date.now()).toLocaleString()}${targets}</span></div>
      <div class="actions">
        <button onclick="editNotif(${i})">Edit</button>
        <button class="del" onclick="deleteNotif(${i})">Del</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function openAddForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'New Notification';
  document.getElementById('fTitle').value = '';
  document.getElementById('fBody').value = '';
  document.getElementById('fType').value = 'global';
  document.getElementById('fTargets').value = '';
  document.getElementById('targetsRow').style.display = 'none';
  document.getElementById('formCard').classList.add('open');
}

function closeForm() {
  document.getElementById('formCard').classList.remove('open');
  editingId = null;
}

function editNotif(idx) {
  const n = notifications[idx];
  if (!n) return;
  editingId = idx;
  document.getElementById('formTitle').textContent = 'Edit Notification';
  document.getElementById('fTitle').value = n.title || '';
  document.getElementById('fBody').value = n.body || '';
  document.getElementById('fType').value = n.type || 'global';
  document.getElementById('fTargets').value = n.targets || '';
  document.getElementById('targetsRow').style.display = n.type === 'targeted' ? 'block' : 'none';
  document.getElementById('formCard').classList.add('open');
}

document.getElementById('fType').addEventListener('change', function() {
  document.getElementById('targetsRow').style.display = this.value === 'targeted' ? 'block' : 'none';
});

function saveForm() {
  const title = document.getElementById('fTitle').value.trim();
  const body = document.getElementById('fBody').value.trim();
  const type = document.getElementById('fType').value;
  const targets = document.getElementById('fTargets').value.trim();
  if (!title || !body) { toast('Title and body are required'); return; }
  const notif = {
    id: Date.now() + Math.floor(Math.random() * 1000),
    title,
    body,
    type,
    timestamp: Date.now(),
    read: false
  };
  if (type === 'targeted' && targets) notif.targets = targets;
  if (editingId !== null && notifications[editingId]) {
    notif.id = notifications[editingId].id;
    notifications[editingId] = notif;
  } else {
    notifications.push(notif);
  }
  closeForm();
  renderList();
  toast(editingId !== null ? 'Notification updated' : 'Notification added');
}

function deleteNotif(idx) {
  if (!confirm('Delete this notification?')) return;
  notifications.splice(idx, 1);
  renderList();
  toast('Notification deleted');
}

function publishAll() {
  if (notifications.length === 0) { toast('Nothing to publish'); return; }
  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.textContent = 'Publishing...';
  fetch(`${WORKER_URL}/publish-notifications`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminKey },
    body: JSON.stringify(notifications)
  })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        toast(`Published ${res.count} notification(s) successfully`);
      } else {
        toast('Error: ' + (res.error || 'Unknown'));
        if (res.error === 'Unauthorized') {
          document.getElementById('mainUI').style.display = 'none';
          document.getElementById('loginGate').style.display = 'block';
          document.getElementById('loginError').style.display = 'block';
          document.getElementById('adminKeyInput').value = '';
        }
      }
    })
    .catch(err => toast('Network error: ' + err.message))
    .finally(() => { btn.disabled = false; btn.textContent = '⬆ Publish to Server'; });
}
</script>
</body>
</html>
