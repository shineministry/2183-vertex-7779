<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
SHINE VAULT ADMIN
</title>

    <link rel="icon"
type="image/png"
href="favicon.png">
    
<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

    /* =========================
   PREMIUM ANIMATIONS
========================= */

body{

    animation:
    bodyFade 1.2s ease;

}

@keyframes bodyFade{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

.card{

    position:relative;
    overflow:hidden;

}

.card::before{

    content:"";

    position:absolute;

    top:-120%;
    left:-40%;

    width:180%;
    height:220%;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.08),
    transparent
    );

    transform:
    rotate(25deg);

    animation:
    shineMove 6s linear infinite;

}

@keyframes shineMove{

    0%{
        transform:
        translateX(-100%)
        rotate(25deg);
    }

    100%{
        transform:
        translateX(100%)
        rotate(25deg);
    }

}

.card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 25px 60px rgba(0,0,0,.45);

}

/* BUTTON EFFECTS */

.btn{

    position:relative;
    overflow:hidden;

}

.btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.22),
    transparent
    );

    transition:.6s;

}

.btn:hover::before{

    left:120%;

}

.btn:active{

    transform:
    scale(.96);

}

/* FLOATING BACKGROUND GLOW */

body::before,
body::after{

    content:"";

    position:fixed;

    width:420px;
    height:420px;

    border-radius:50%;

    filter:blur(100px);

    opacity:.18;

    z-index:-1;

    animation:
    floatGlow 10s ease-in-out infinite;

}

body::before{

    top:-120px;
    left:-120px;

    background:#2563eb;

}

body::after{

    bottom:-120px;
    right:-120px;

    background:#06b6d4;

    animation-delay:5s;

}

@keyframes floatGlow{

    0%{

        transform:
        translateY(0px)
        scale(1);

    }

    50%{

        transform:
        translateY(-35px)
        scale(1.08);

    }

    100%{

        transform:
        translateY(0px)
        scale(1);

    }

}

/* LOGO PULSE */

.logo{

    animation:
    logoPulse 3s ease-in-out infinite;

}

@keyframes logoPulse{

    0%{

        transform:scale(1);

        box-shadow:
        0 0 0 rgba(37,99,235,.5);

    }

    50%{

        transform:scale(1.05);

        box-shadow:
        0 0 35px rgba(37,99,235,.45);

    }

    100%{

        transform:scale(1);

        box-shadow:
        0 0 0 rgba(37,99,235,.5);

    }

}

/* REQUEST COUNT ANIMATION */

.stats-number{

    animation:
    glowText 2s ease-in-out infinite;

}

@keyframes glowText{

    0%{

        text-shadow:
        0 0 0 rgba(255,255,255,.1);

    }

    50%{

        text-shadow:
        0 0 20px rgba(255,255,255,.45);

    }

    100%{

        text-shadow:
        0 0 0 rgba(255,255,255,.1);

    }

}

/* INPUT FOCUS */

.input:focus{

    border-color:
    rgba(59,130,246,.8);

    box-shadow:
    0 0 25px rgba(59,130,246,.25);

    transform:
    scale(1.01);

}

/* LOGIN BOX FLOAT */

.login-box{

    animation:
    loginFloat 5s ease-in-out infinite;

}

@keyframes loginFloat{

    0%{

        transform:
        translateY(0px);

    }

    50%{

        transform:
        translateY(-10px);

    }

    100%{

        transform:
        translateY(0px);

    }

}
    
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --bg1:#020617;
    --bg2:#0f172a;
    --glass:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.12);
    --text:#f8fafc;
    --muted:#94a3b8;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#3b82f6;

}

body{

    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#1e3a8a 0%,transparent 30%),
    radial-gradient(circle at bottom right,#0f766e 0%,transparent 30%),
    linear-gradient(135deg,var(--bg1),var(--bg2));

    color:var(--text);
    overflow-x:hidden;
    padding:30px;

}

/* =========================
   LOGIN SCREEN
========================= */

#login-screen{

    position:fixed;
    inset:0;
    background:
    linear-gradient(135deg,#020617,#0f172a);

    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;

}

.login-box{

    width:100%;
    max-width:420px;

    background:var(--glass);

    backdrop-filter:blur(20px);

    border:1px solid var(--border);

    border-radius:30px;

    padding:40px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.45);

    animation:fadeUp .6s ease;

}

.logo{

    width:85px;
    height:85px;
    border-radius:24px;
    background:
    linear-gradient(135deg,#2563eb,#06b6d4);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:2rem;
    font-weight:800;

    margin:auto;
    margin-bottom:25px;

}

.login-title{

    text-align:center;
    font-size:1.8rem;
    font-weight:800;
    margin-bottom:10px;

}

.login-sub{

    text-align:center;
    color:var(--muted);
    line-height:1.7;
    margin-bottom:30px;

}

.input{

    width:100%;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.08);
    outline:none;
    padding:16px;
    border-radius:18px;
    color:white;
    font-size:1rem;
    margin-bottom:20px;

}

.input::placeholder{
    color:#94a3b8;
}

.login-btn{

    width:100%;
    border:none;
    background:
    linear-gradient(135deg,#2563eb,#06b6d4);

    color:white;
    padding:16px;
    border-radius:18px;
    font-size:1rem;
    font-weight:800;
    cursor:pointer;

    transition:.3s;

}

.login-btn:hover{

    transform:translateY(-2px);

}

/* =========================
   MAIN PANEL
========================= */

.dashboard{

    max-width:1300px;
    margin:auto;

}

.topbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;

    margin-bottom:35px;

}

.title-wrap h1{

    font-size:2.2rem;
    font-weight:800;
    margin-bottom:8px;

}

.title-wrap p{

    color:var(--muted);

}

.stats{

    background:var(--glass);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);

    padding:20px 26px;
    border-radius:24px;

    min-width:240px;

}

.stats-label{

    color:var(--muted);
    margin-bottom:10px;

}

.stats-number{

    font-size:2rem;
    font-weight:800;

}

.requests-grid{

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(330px,1fr));

    gap:25px;

}

.card{

    background:var(--glass);

    border:1px solid var(--border);

    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:28px;

    box-shadow:
    0 10px 40px rgba(0,0,0,.25);

    transition:.35s;

    animation:fadeUp .6s ease;

}

.card:hover{

    transform:
    translateY(-6px);

}

.user-row{

    display:flex;
    align-items:center;
    gap:16px;

    margin-bottom:25px;

}

.avatar{

    width:62px;
    height:62px;
    border-radius:18px;

    background:
    linear-gradient(135deg,#2563eb,#06b6d4);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.3rem;
    font-weight:800;

}

.user-info h2{

    font-size:1.2rem;
    margin-bottom:5px;

}

.user-info span{

    color:var(--muted);
    font-size:.92rem;

}

.info-box{

    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.06);

    padding:16px;
    border-radius:18px;

    margin-bottom:16px;

}

.info-title{

    color:var(--muted);
    margin-bottom:8px;
    font-size:.9rem;

}

.info-value{

    line-height:1.7;
    word-break:break-word;

}

.button-group{

    display:flex;
    gap:14px;
    margin-top:25px;

}

.btn{

    flex:1;
    border:none;
    padding:15px;
    border-radius:18px;
    color:white;
    font-weight:800;
    cursor:pointer;
    transition:.3s;

}

.btn:hover{

    transform:translateY(-2px);

}

.approve{

    background:
    linear-gradient(135deg,#16a34a,#22c55e);

}

.deny{

    background:
    linear-gradient(135deg,#dc2626,#ef4444);

}

.empty{

    text-align:center;
    padding:70px 20px;
    color:var(--muted);

}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:
        translateY(25px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }

}

@media(max-width:768px){

    body{
        padding:18px;
    }

    .topbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .title-wrap h1{
        font-size:1.8rem;
    }

}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->

<div id="login-screen">

    <div class="login-box">

        <div class="logo">
            SV
        </div>

        <div class="login-title">
            SHINE VAULT ADMIN
        </div>

        <div class="login-sub">

            Secure administrator approval panel.<br>
            Authorized access only.

        </div>

        <input
        type="password"
        id="admin-pass"
        class="input"
        placeholder="Enter Admin Password">

        <button
        class="login-btn"
        onclick="unlockAdmin()">

            ACCESS ADMIN PANEL

        </button>

    </div>

</div>

<!-- MAIN DASHBOARD -->

<div class="dashboard">

    <div class="topbar">

        <div class="title-wrap">

            <h1>
                Access Approval Center
            </h1>

            <p>
                Real-time passkey approval management system
            </p>

        </div>

        <div class="stats">

            <div class="stats-label">
                Pending Requests
            </div>

            <div
            class="stats-number"
            id="request-count">

                0

            </div>

        </div>

    </div>

    <div
    class="requests-grid"
    id="requests">

        <div class="empty">
            Waiting for incoming requests...
        </div>

    </div>

</div>

    <audio
id="approveSound"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=correct-2-46134.mp3">
</audio>

    <button onclick="forceLogout('SESSION_ID')">
Force Logout
</button>
    
<script>

const ADMIN_PASSWORD =
"Mfyi2019wIbSC@Justice";

function unlockAdmin(){

    const pass =
    document.getElementById(
    'admin-pass'
    ).value.trim();

    if(
    pass !==
    ADMIN_PASSWORD
    ){

        alert(
        "Incorrect administrator password."
        );

        return;
    }

    document.getElementById(
    'login-screen'
    ).style.display =
    'none';

}

    async function forceLogout(id){

    const {
        doc,
        updateDoc
    } = window.firestoreFunctions;

    await updateDoc(

        doc(
            window.db,
            "activeSessions",
            id
        ),

        {

            forceLogout:true

        }

    );

}
</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

    getFirestore,
    collection,
    onSnapshot,
    doc,
    updateDoc

}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBbOd2ZKqiPHTBEMmjBMnxAU_mdwLz7uM0",

    authDomain: "online-vault-shine-26.firebaseapp.com",

    projectId: "online-vault-shine-26",

    storageBucket:
    "online-vault-shine-26.firebasestorage.app",

    messagingSenderId:
    "79788612818",

    appId:
    "1:79788612818:web:41cfb16a4b36b1d5bfe10b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const requestsDiv =
document.getElementById(
'requests'
);

const countDiv =
document.getElementById(
'request-count'
);

onSnapshot(

    collection(
        db,
        "accessRequests"
    ),

    (snapshot)=>{

        requestsDiv.innerHTML =
        "";

        let pendingCount = 0;

        snapshot.forEach((docSnap)=>{

            const data =
            docSnap.data();

            if(
            data.status !==
            "pending"
            ) return;

            pendingCount++;

            const card =
            document.createElement(
            'div'
            );

card.className =
'card';

card.style.opacity =
'0';

card.style.transform =
'translateY(30px)';

setTimeout(()=>{

    card.style.transition =
    '.5s';

    card.style.opacity =
    '1';

    card.style.transform =
    'translateY(0)';

},100);

            card.innerHTML = `

                <div class="user-row">

                    <div class="avatar">

                        ${data.visitorName
                        ?.charAt(0)
                        ?.toUpperCase() || "U"}

                    </div>

                    <div class="user-info">

                        <h2>
                            ${data.visitorName}
                        </h2>

                        <span>
                            Access Request
                        </span>

                    </div>

                </div>

                <div class="info-box">

                    <div class="info-title">
                        Purpose
                    </div>

                    <div class="info-value">

                        ${data.purpose ||
                        "No purpose provided"}

                    </div>

                </div>

                <div class="info-box">

                    <div class="info-title">
                        Device
                    </div>

                    <div class="info-value">

                        ${data.device}

                    </div>

                </div>

                <div class="button-group">

                    <button
                    class="btn approve">

                        APPROVE

                    </button>

                    <button
                    class="btn deny">

                        DENY

                    </button>

                </div>

            `;

            card.querySelector(
            '.approve'
            ).onclick =
            async()=>{

                await updateDoc(

                    doc(
                        db,
                        "accessRequests",
                        docSnap.id
                    ),

                    {
                        status:
                        "approved"
                    }

                );

            };

            card.querySelector(
            '.deny'
            ).onclick =
            async()=>{

                document.getElementById(
'approveSound'
).play();
                
                await updateDoc(

                    doc(
                        db,
                        "accessRequests",
                        docSnap.id
                    ),

                    {
                        status:
                        "denied"
                    }

                );

            };

            requestsDiv.appendChild(
            card
            );

        });

        countDiv.textContent =
        pendingCount;

        if(pendingCount === 0){

            requestsDiv.innerHTML = `

            <div class="empty">

                No pending access requests.

            </div>

            `;
        }

    }

);

</script>

    <script>

/* DISABLE RIGHT CLICK */

document.addEventListener(

    'contextmenu',

    event => event.preventDefault()

);

/* DISABLE INSPECT SHORTCUTS */

document.addEventListener(

    'keydown',

    function(e){

        /* F12 */

        if(e.key === 'F12'){

            e.preventDefault();

        }

        /* CTRL+SHIFT+I */

        if(
        e.ctrlKey &&
        e.shiftKey &&
        e.key === 'I'
        ){

            e.preventDefault();

        }

        /* CTRL+SHIFT+J */

        if(
        e.ctrlKey &&
        e.shiftKey &&
        e.key === 'J'
        ){

            e.preventDefault();

        }

        /* CTRL+U */

        if(
        e.ctrlKey &&
        e.key === 'u'
        ){

            e.preventDefault();

        }

    }

);

</script>
</body>
</html>
