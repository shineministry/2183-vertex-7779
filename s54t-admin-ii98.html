<!DOCTYPE html>
<html>
<head>

<title>
ADMIN ACCESS PANEL
</title>

<style>

body{

    font-family:sans-serif;
    background:#f1f5f9;
    padding:30px;

}

.card{

    background:white;
    padding:25px;
    border-radius:18px;
    margin-bottom:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.08);

}

button{

    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    margin-right:10px;

}

.approve{

    background:#16a34a;
    color:white;

}

.deny{

    background:#dc2626;
    color:white;

}

.force{

    background:#2563eb;
    color:white;
    margin-top:10px;

}

</style>

</head>
<body>

<h1>
Pending Access Requests
</h1>

<div id="requests"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
    getFirestore,
    collection,
    onSnapshot,
    doc,
    updateDoc
}
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {

    apiKey: "AIzaSyBbOd2ZKqiPHTBEMmjBMnxAU_mdwLz7uM0",

    authDomain: "online-vault-shine-26.firebaseapp.com",

    projectId: "online-vault-shine-26",

    storageBucket: "online-vault-shine-26.firebasestorage.app",

    messagingSenderId: "79788612818",

    appId: "1:79788612818:web:41cfb16a4b36b1d5bfe10b"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const requestsDiv =
document.getElementById(
'requests');

onSnapshot(

    collection(
    db,
    "accessRequests"
    ),

    snapshot=>{

        requestsDiv.innerHTML =
        "";

        snapshot.forEach(docSnap=>{

            const data =
            docSnap.data();

            if(
            data.status !==
            "pending"
            ) return;

            requestsDiv.innerHTML += `

            <div class="card">

                <h3>
                    ${data.visitorName}
                </h3>

                <p>
                    ${data.purpose}
                </p>

                <p>
                    ${data.device}
                </p>

                <p>
                    <b>Session ID:</b>
                    ${data.sessionId || "Not Available"}
                </p>

                <button
                class="approve"
                onclick="approveRequest('${docSnap.id}')">

                    APPROVE

                </button>

                <button
                class="deny"
                onclick="denyRequest('${docSnap.id}')">

                    DENY

                </button>

                <button
                class="force"
                onclick="forceLogout('${data.sessionId || ""}')">

                    FORCE LOGOUT

                </button>

            </div>
            `;
        });

    }

);

window.approveRequest =
async(id)=>{

    await updateDoc(

        doc(
            db,
            "accessRequests",
            id
        ),

        {
            status:"approved"
        }

    );

};

window.denyRequest =
async(id)=>{

    await updateDoc(

        doc(
            db,
            "accessRequests",
            id
        ),

        {
            status:"denied"
        }

    );

};

window.forceLogout =
async(sessionId)=>{

    if(!sessionId){

        alert(
        "No session found"
        );

        return;
    }

    try{

        await updateDoc(

            doc(
                db,
                "activeSessions",
                sessionId
            ),

            {
                forceLogout:true
            }

        );

        alert(
        "User force logged out."
        );

    }catch(err){

        console.error(err);

        alert(
        "Force logout failed"
        );

    }

};

</script>

</body>
</html>
